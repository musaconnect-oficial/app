<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña | MusaConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }

        .input-field {
            width: 100%; background: #1c1c1c; border: 1px solid #27272a;
            color: #fff; border-radius: 12px; padding: 14px 16px;
            font-size: 14px; transition: all 0.2s;
        }
        .input-field:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.2); }
        
        .btn-primary {
            width: 100%; background: #7c3aed; color: #fff; font-weight: 700;
            padding: 14px; border-radius: 12px; font-size: 15px;
            transition: all 0.2s; border: none; cursor: pointer;
            box-shadow: 0 0 15px rgba(124,58,237,0.3);
        }
        .btn-primary:hover { background: #6d28d9; transform: translateY(-2px); box-shadow: 0 0 20px rgba(124,58,237,0.5); }
        .btn-primary:disabled { background: #3f3f46; box-shadow: none; cursor: not-allowed; transform: none; }
    </style>
</head>
<body class="bg-[#0e0e0e] text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tight">MUSA<span class="text-purple-600">CONNECT</span></h1>
            <p class="text-zinc-400 text-sm mt-2">Restablece tu acceso</p>
        </div>

        <div class="bg-[#141414]/80 backdrop-blur border border-zinc-800 rounded-3xl p-8 shadow-2xl" id="panel-formulario">
            <div class="flex flex-col gap-5">
                <div>
                    <label class="text-xs text-zinc-400 font-bold mb-1.5 block uppercase tracking-wider">Nueva Contraseña</label>
                    <input type="password" id="nueva-clave" class="input-field" placeholder="Mínimo 6 caracteres">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 font-bold mb-1.5 block uppercase tracking-wider">Confirmar Contraseña</label>
                    <input type="password" id="confirmar-clave" class="input-field" placeholder="Repite la contraseña">
                </div>

                <div id="mensaje-box" class="hidden text-xs rounded-xl px-4 py-3 text-center transition-all"></div>

                <button id="btn-guardar" class="btn-primary mt-2" onclick="guardarNuevaClave()">Actualizar Contraseña</button>
            </div>
        </div>

        <div id="panel-exito" class="hidden bg-green-900/20 border border-green-800 rounded-3xl p-8 text-center mt-6">
            <div class="text-5xl mb-4">✅</div>
            <h2 class="text-xl font-black mb-2 text-green-400">¡Clave actualizada!</h2>
            <p class="text-zinc-400 text-sm mb-6">Tu contraseña se guardó correctamente en el ecosistema.</p>
            <a href="login.html" class="btn-primary inline-block w-full">Ir a Iniciar Sesión</a>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Validar que la página se haya abierto desde un link de recuperación válido
        window.onload = function() {
            const hash = window.location.hash;
            if (!hash || !hash.includes('access_token')) {
                mostrarMensaje('Link inválido o expirado. Solicita uno nuevo.', 'error');
                document.getElementById('btn-guardar').disabled = true;
            }
        };

        async function guardarNuevaClave() {
            const clave1 = document.getElementById('nueva-clave').value;
            const clave2 = document.getElementById('confirmar-clave').value;
            const btn = document.getElementById('btn-guardar');

            if (!clave1 || !clave2) return mostrarMensaje('Completa ambos campos.', 'error');
            if (clave1.length < 6) return mostrarMensaje('La contraseña debe tener mínimo 6 caracteres.', 'error');
            if (clave1 !== clave2) return mostrarMensaje('Las contraseñas no coinciden.', 'error');

            btn.disabled = true;
            btn.textContent = 'Actualizando...';

            // Magia de Supabase: detecta la sesión del link y actualiza la contraseña
            const { error } = await client.auth.updateUser({
                password: clave1
            });

            if (error) {
                mostrarMensaje(error.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Actualizar Contraseña';
            } else {
                // Éxito: Ocultar formulario, mostrar panel verde
                document.getElementById('panel-formulario').classList.add('hidden');
                document.getElementById('panel-exito').classList.remove('hidden');
                
                // Cerramos la sesión temporal de recuperación por seguridad
                await client.auth.signOut();
            }
        }

        function mostrarMensaje(texto, tipo) {
            const box = document.getElementById('mensaje-box');
            box.textContent = texto;
            box.classList.remove('hidden', 'bg-red-900/30', 'border-red-800', 'text-red-400', 'bg-green-900/30', 'border-green-800', 'text-green-400');
            
            if (tipo === 'error') {
                box.classList.add('bg-red-900/30', 'border', 'border-red-800', 'text-red-400');
            } else {
                box.classList.add('bg-green-900/30', 'border', 'border-green-800', 'text-green-400');
            }
        }
    </script>
</body>
</html>
