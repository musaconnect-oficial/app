<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed | Yuvng Miuze</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .media-container video, .media-container img {
            max-height: 480px;
            width: 100%;
            object-fit: contain;
            background: #000;
        }
        .corazon-btn.activo { color: #ef4444; }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#0e0e0e] text-white min-h-screen pb-20">

    <!-- HEADER -->
    <header class="bg-gradient-to-b from-zinc-900 to-[#0e0e0e] border-b border-zinc-800 sticky top-0 z-50 backdrop-blur">
        <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-zinc-400 hover:text-white text-sm transition-colors">← Inicio</a>
            <h1 class="text-lg font-black tracking-tight">YUVNG <span class="text-red-500">FEED</span></h1>
            <span class="text-xs text-zinc-600">@yuvngmiuze</span>
        </div>
    </header>

    <!-- POSTS -->
    <main class="max-w-2xl mx-auto px-4 pt-6">
        <div id="contenedor-posts" class="flex flex-col gap-6">
            <div class="text-center text-zinc-600 py-20 text-sm">Cargando publicaciones...</div>
        </div>
    </main>

    <script>
    (function() {
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarPosts() {
            const { data: posts, error } = await client
                .from('feed_posts')
                .select('*')
                .order('created_at', { ascending: false });

            const contenedor = document.getElementById('contenedor-posts');

            if (!posts || posts.length === 0) {
                contenedor.innerHTML = '<div class="text-center text-zinc-600 py-20 text-sm">No hay publicaciones todavía.</div>';
                return;
            }

            const { data: comentarios } = await client.from('feed_comentarios').select('*');

            contenedor.innerHTML = posts.map(p => {
                let mediaHTML = '';
                if (p.media_url) {
                    const esVideo = p.media_url.match(/\.(mp4|webm|mov)/i);
                    if (esVideo) {
                        mediaHTML = `
                        <div class="media-container bg-black rounded-xl overflow-hidden border border-zinc-800">
                            <video controls playsinline preload="metadata">
                                <source src="${p.media_url}">
                            </video>
                        </div>`;
                    } else {
                        mediaHTML = `
                        <div class="media-container rounded-xl overflow-hidden border border-zinc-800">
                            <img src="${p.media_url}" alt="Publicación" loading="lazy">
                        </div>`;
                    }
                }

                const comsFiltrados = (comentarios || []).filter(c => c.post_id === p.id);
                const comsHTML = comsFiltrados.length > 0
                    ? comsFiltrados.map(c => `
                        <div class="flex gap-2 py-2 border-b border-zinc-800 last:border-0">
                            <div class="w-7 h-7 rounded-full bg-zinc-700 flex items-center justify-center text-xs font-black flex-shrink-0 mt-0.5">
                                ${c.autor.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <span class="text-xs font-bold text-zinc-300">${c.autor}</span>
                                <p class="text-sm text-zinc-400 mt-0.5">${c.mensaje}</p>
                            </div>
                        </div>
                    `).join('')
                    : '<p class="text-xs text-zinc-700 italic py-2">Sé el primero en comentar.</p>';

                const fecha = new Date(p.created_at).toLocaleDateString('es-PE', { day: 'numeric', month: 'short', year: 'numeric' });

                return `
                <article class="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden fade-in" id="post-${p.id}">
                    <!-- Cabecera del post -->
                    <div class="flex items-center gap-3 p-4 pb-3">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-red-600 to-red-900 flex items-center justify-center font-black text-sm flex-shrink-0">YM</div>
                        <div>
                            <p class="font-bold text-sm text-white">Yuvng Miuze</p>
                            <p class="text-xs text-zinc-500">${fecha}</p>
                        </div>
                        <span class="ml-auto bg-red-600 text-white text-[10px] font-black px-2 py-0.5 rounded-full uppercase tracking-widest">Oficial</span>
                    </div>

                    <!-- Texto del post -->
                    ${p.texto ? `<p class="px-4 pb-3 text-sm text-zinc-300 leading-relaxed">${p.texto}</p>` : ''}

                    <!-- Media -->
                    ${mediaHTML ? `<div class="px-4 pb-3">${mediaHTML}</div>` : ''}

                    <!-- Acciones -->
                    <div class="px-4 py-3 border-t border-zinc-800 flex items-center gap-4">
                        <button onclick="window.toggleLike(${p.id})" class="corazon-btn flex items-center gap-1.5 text-zinc-400 hover:text-red-500 transition-colors text-sm font-bold" id="like-${p.id}">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                            <span id="likes-count-${p.id}">${p.likes || 0}</span>
                        </button>
                        <button onclick="window.toggleComentarios('${p.id}')" class="flex items-center gap-1.5 text-zinc-400 hover:text-white transition-colors text-sm font-bold">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                            ${comsFiltrados.length}
                        </button>
                    </div>

                    <!-- Sección comentarios -->
                    <div id="coms-${p.id}" class="hidden border-t border-zinc-800">
                        <div class="px-4 py-3 max-h-64 overflow-y-auto" id="lista-coms-${p.id}">
                            ${comsHTML}
                        </div>
                        <div class="p-4 pt-0 flex gap-2 border-t border-zinc-800">
                            <input type="text" id="autor-feed-${p.id}" placeholder="Tu nombre" maxlength="30"
                                class="w-1/3 bg-zinc-800 border border-zinc-700 text-white text-xs rounded-full px-3 py-2 focus:outline-none focus:border-red-500 placeholder-zinc-600">
                            <input type="text" id="msg-feed-${p.id}" placeholder="Escribe un comentario..." maxlength="200"
                                class="flex-1 bg-zinc-800 border border-zinc-700 text-white text-xs rounded-full px-3 py-2 focus:outline-none focus:border-red-500 placeholder-zinc-600">
                            <button onclick="window.comentarFeed(${p.id})"
                                class="bg-red-600 hover:bg-red-500 text-white text-xs font-bold px-4 py-2 rounded-full transition-colors flex-shrink-0">
                                Enviar
                            </button>
                        </div>
                    </div>
                </article>
                `;
            }).join('');

            // Restaurar likes locales
            posts.forEach(p => {
                const likeado = localStorage.getItem('like_feed_' + p.id);
                if (likeado) {
                    document.getElementById('like-' + p.id)?.classList.add('activo');
                }
            });
        }

        window.toggleComentarios = function(postId) {
            const coms = document.getElementById('coms-' + postId);
            coms.classList.toggle('hidden');
            if (!coms.classList.contains('hidden')) {
                document.getElementById('autor-feed-' + postId)?.focus();
            }
        };

        window.toggleLike = async function(postId) {
            const btn = document.getElementById('like-' + postId);
            const countEl = document.getElementById('likes-count-' + postId);
            const likeKey = 'like_feed_' + postId;
            const yaDioLike = localStorage.getItem(likeKey);

            const { data } = await client.from('feed_posts').select('likes').eq('id', postId).single();
            if (!data) return;

            let nuevosLikes = yaDioLike ? Math.max(0, (data.likes || 0) - 1) : (data.likes || 0) + 1;
            await client.from('feed_posts').update({ likes: nuevosLikes }).eq('id', postId);

            countEl.textContent = nuevosLikes;
            if (yaDioLike) {
                localStorage.removeItem(likeKey);
                btn.classList.remove('activo');
            } else {
                localStorage.setItem(likeKey, '1');
                btn.classList.add('activo');
            }
        };

        window.comentarFeed = async function(postId) {
            const autor = document.getElementById('autor-feed-' + postId).value.trim();
            const mensaje = document.getElementById('msg-feed-' + postId).value.trim();
            if (!autor || !mensaje) return alert('Escribe tu nombre y un comentario.');

            await client.from('feed_comentarios').insert([{ post_id: postId, autor, mensaje }]);

            document.getElementById('autor-feed-' + postId).value = '';
            document.getElementById('msg-feed-' + postId).value = '';

            const { data: comsActualizados } = await client.from('feed_comentarios').select('*').eq('post_id', postId);
            const lista = document.getElementById('lista-coms-' + postId);
            lista.innerHTML = comsActualizados.map(c => `
                <div class="flex gap-2 py-2 border-b border-zinc-800 last:border-0">
                    <div class="w-7 h-7 rounded-full bg-zinc-700 flex items-center justify-center text-xs font-black flex-shrink-0 mt-0.5">
                        ${c.autor.charAt(0).toUpperCase()}
                    </div>
                    <div>
                        <span class="text-xs font-bold text-zinc-300">${c.autor}</span>
                        <p class="text-sm text-zinc-400 mt-0.5">${c.mensaje}</p>
                    </div>
                </div>
            `).join('');
            lista.scrollTop = lista.scrollHeight;
        };

        cargarPosts();
    })();
    </script>
</body>
</html>
