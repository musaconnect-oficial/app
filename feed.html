<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed | Yuvng Miuze</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }

        #progress-bar {
            position: fixed; top: 0; left: 0; height: 3px; width: 0%;
            background: linear-gradient(90deg, #f97316, #dc2626);
            z-index: 9999; transition: width 0.3s ease;
        }

        /* FOTO CUADRADA tipo Instagram */
        .media-cuadrada {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            background: #000;
            overflow: hidden;
            border-radius: 12px;
        }
        .media-cuadrada img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .media-cuadrada video {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
        }

        .corazon-btn.activo svg { fill: #ef4444; stroke: #ef4444; }
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        /* SKELETON LOADER */
        .skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-[#0e0e0e] text-white min-h-screen pb-20">

    <div id="progress-bar"></div>

    <!-- HEADER -->
    <header class="bg-[#0e0e0e] border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-zinc-400 hover:text-white text-sm transition-colors flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Inicio
            </a>
            <div class="text-center">
                <h1 class="text-base font-black tracking-tight">YUVNG <span class="text-orange-500">FEED</span></h1>
                <p class="text-[10px] text-zinc-600">@yuvngmiuze</p>
            </div>
            <a href="foro.html" class="text-zinc-400 hover:text-white text-xs font-bold transition-colors">💬 Foro</a>
        </div>
    </header>

    <!-- POSTS -->
    <main class="max-w-xl mx-auto px-4 pt-5">
        <!-- Skeletons mientras carga -->
        <div id="skeletons" class="flex flex-col gap-6">
            <div class="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden">
                <div class="flex items-center gap-3 p-4"><div class="skeleton w-10 h-10 rounded-full"></div><div class="flex-1"><div class="skeleton h-3 w-32 mb-2"></div><div class="skeleton h-2 w-20"></div></div></div>
                <div class="px-4 pb-3"><div class="skeleton" style="padding-bottom:100%;border-radius:12px;"></div></div>
            </div>
            <div class="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden">
                <div class="flex items-center gap-3 p-4"><div class="skeleton w-10 h-10 rounded-full"></div><div class="flex-1"><div class="skeleton h-3 w-32 mb-2"></div><div class="skeleton h-2 w-20"></div></div></div>
                <div class="px-4 pb-3"><div class="skeleton h-24 rounded-xl"></div></div>
            </div>
        </div>

        <div id="contenedor-posts" class="flex flex-col gap-6 hidden"></div>
    </main>

    <script>
    (function() {
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Barra de progreso
        const bar = document.getElementById('progress-bar');
        let p = 0;
        const pInt = setInterval(() => { p = Math.min(p + 20, 80); bar.style.width = p + '%'; }, 150);
        function finBar() { clearInterval(pInt); bar.style.width='100%'; setTimeout(()=>bar.style.opacity='0',300); }

        async function cargarPosts() {
            const { data: posts } = await client.from('feed_posts').select('*').order('created_at', { ascending: false });
            const { data: comentarios } = await client.from('feed_comentarios').select('*');

            document.getElementById('skeletons').classList.add('hidden');
            const contenedor = document.getElementById('contenedor-posts');
            contenedor.classList.remove('hidden');
            finBar();

            if (!posts || posts.length === 0) {
                contenedor.innerHTML = '<div class="text-center text-zinc-600 py-20 text-sm">No hay publicaciones todavía.</div>';
                return;
            }

            contenedor.innerHTML = posts.map(p => {
                let mediaHTML = '';
                if (p.media_url) {
                    const esVideo = p.media_url.match(/\.(mp4|webm|mov)/i);
                    if (esVideo) {
                        mediaHTML = `
                        <div class="px-0 pb-1">
                            <div class="media-cuadrada border border-zinc-800">
                                <video controls playsinline preload="metadata">
                                    <source src="${p.media_url}">
                                </video>
                            </div>
                        </div>`;
                    } else {
                        mediaHTML = `
                        <div class="px-0 pb-1">
                            <div class="media-cuadrada">
                                <img src="${p.media_url}" alt="Publicación" loading="lazy">
                            </div>
                        </div>`;
                    }
                }

                const comsFiltrados = (comentarios || []).filter(c => c.post_id === p.id);
                const comsHTML = comsFiltrados.map(c => `
                    <div class="flex gap-2 py-2 border-b border-zinc-800 last:border-0">
                        <div class="w-6 h-6 rounded-full bg-zinc-700 flex items-center justify-center text-[10px] font-black flex-shrink-0 mt-0.5">${c.autor.charAt(0).toUpperCase()}</div>
                        <div><span class="text-xs font-bold text-zinc-300">${c.autor} </span><span class="text-xs text-zinc-400">${c.mensaje}</span></div>
                    </div>`).join('') || '<p class="text-xs text-zinc-700 italic py-2">Sé el primero en comentar.</p>';

                const fecha = new Date(p.created_at).toLocaleDateString('es-PE', { day: 'numeric', month: 'short' });
                const likeKey = 'like_feed_' + p.id;
                const yaLike = localStorage.getItem(likeKey);

                return `
                <article class="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden fade-in" id="post-${p.id}">
                    <div class="flex items-center gap-3 px-4 py-3">
                        <div class="w-9 h-9 rounded-full bg-gradient-to-br from-red-600 to-red-900 flex items-center justify-center font-black text-xs flex-shrink-0">YM</div>
                        <div class="flex-1">
                            <p class="font-bold text-sm text-white leading-none">Yuvng Miuze</p>
                            <p class="text-[10px] text-zinc-500 mt-0.5">${fecha}</p>
                        </div>
                        <span class="bg-red-600 text-white text-[9px] font-black px-2 py-0.5 rounded-full uppercase tracking-widest">Oficial</span>
                    </div>

                    ${p.texto ? `<p class="px-4 pb-3 text-sm text-zinc-200 leading-relaxed">${p.texto}</p>` : ''}
                    ${mediaHTML}

                    <div class="px-4 py-2 flex items-center gap-5 border-t border-zinc-800">
                        <button onclick="window.toggleLike(${p.id})" class="corazon-btn flex items-center gap-1.5 text-zinc-400 hover:text-red-500 transition-colors ${yaLike ? 'activo' : ''}" id="like-${p.id}">
                            <svg class="w-5 h-5" fill="${yaLike ? '#ef4444' : 'none'}" stroke="${yaLike ? '#ef4444' : 'currentColor'}" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                            <span class="text-sm font-bold" id="likes-count-${p.id}">${p.likes || 0}</span>
                        </button>
                        <button onclick="window.toggleComs('${p.id}')" class="flex items-center gap-1.5 text-zinc-400 hover:text-white transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                            <span class="text-sm font-bold">${comsFiltrados.length}</span>
                        </button>
                    </div>

                    <div id="coms-${p.id}" class="hidden border-t border-zinc-800">
                        <div class="px-4 py-2 max-h-48 overflow-y-auto" id="lista-coms-${p.id}">${comsHTML}</div>
                        <div class="px-3 pb-3 flex gap-2">
                            <input type="text" id="autor-feed-${p.id}" placeholder="Tu nombre" maxlength="30"
                                class="w-1/4 bg-zinc-800 border border-zinc-700 text-white text-xs rounded-full px-3 py-2 focus:outline-none focus:border-orange-500 placeholder-zinc-600">
                            <input type="text" id="msg-feed-${p.id}" placeholder="Comentar..." maxlength="200"
                                class="flex-1 bg-zinc-800 border border-zinc-700 text-white text-xs rounded-full px-3 py-2 focus:outline-none focus:border-orange-500 placeholder-zinc-600">
                            <button onclick="window.comentarFeed(${p.id})"
                                class="bg-orange-600 hover:bg-orange-500 text-white text-xs font-bold px-4 py-2 rounded-full transition-colors flex-shrink-0">→</button>
                        </div>
                    </div>
                </article>`;
            }).join('');
        }

        window.toggleComs = function(id) {
            document.getElementById('coms-' + id).classList.toggle('hidden');
        };

        window.toggleLike = async function(postId) {
            const btn = document.getElementById('like-' + postId);
            const countEl = document.getElementById('likes-count-' + postId);
            const likeKey = 'like_feed_' + postId;
            const yaLike = localStorage.getItem(likeKey);
            const { data } = await client.from('feed_posts').select('likes').eq('id', postId).single();
            if (!data) return;
            let nuevos = yaLike ? Math.max(0, (data.likes||0) - 1) : (data.likes||0) + 1;
            await client.from('feed_posts').update({ likes: nuevos }).eq('id', postId);
            countEl.textContent = nuevos;
            const svg = btn.querySelector('svg');
            if (yaLike) {
                localStorage.removeItem(likeKey);
                btn.classList.remove('activo');
                svg.setAttribute('fill', 'none'); svg.setAttribute('stroke', 'currentColor');
            } else {
                localStorage.setItem(likeKey, '1');
                btn.classList.add('activo');
                svg.setAttribute('fill', '#ef4444'); svg.setAttribute('stroke', '#ef4444');
            }
        };

        window.comentarFeed = async function(postId) {
            const autor = document.getElementById('autor-feed-' + postId).value.trim();
            const mensaje = document.getElementById('msg-feed-' + postId).value.trim();
            if (!autor || !mensaje) return;
            await client.from('feed_comentarios').insert([{ post_id: postId, autor, mensaje }]);
            document.getElementById('autor-feed-' + postId).value = '';
            document.getElementById('msg-feed-' + postId).value = '';
            const { data: coms } = await client.from('feed_comentarios').select('*').eq('post_id', postId);
            const lista = document.getElementById('lista-coms-' + postId);
            lista.innerHTML = coms.map(c => `
                <div class="flex gap-2 py-2 border-b border-zinc-800 last:border-0">
                    <div class="w-6 h-6 rounded-full bg-zinc-700 flex items-center justify-center text-[10px] font-black flex-shrink-0 mt-0.5">${c.autor.charAt(0).toUpperCase()}</div>
                    <div><span class="text-xs font-bold text-zinc-300">${c.autor} </span><span class="text-xs text-zinc-400">${c.mensaje}</span></div>
                </div>`).join('');
            lista.scrollTop = lista.scrollHeight;
        };

        cargarPosts();
    })();
    </script>
</body>
</html>
