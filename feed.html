<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro Global | MusaConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0e0e0e; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col pb-20">

    <!-- HEADER -->
    <header class="border-b border-zinc-800/80 bg-[#0e0e0e]/90 backdrop-blur sticky top-0 z-50">
        <div class="max-w-2xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-white hover:text-purple-400 transition-colors font-bold text-sm">
                ← Portada
            </a>
            <h1 class="font-black tracking-widest uppercase text-sm">Muro <span class="text-purple-500">Global</span></h1>
            <a href="profile.html" class="bg-zinc-800 hover:bg-zinc-700 text-white text-xs font-bold px-4 py-2 rounded-lg transition-colors border border-zinc-700">Mi Perfil</a>
        </div>
    </header>

    <main class="flex-1 w-full max-w-2xl mx-auto px-4 pt-6">
        
        <!-- CAJA PARA CREAR PUBLICACIÓN -->
        <div class="bg-[#141414] border border-zinc-800 rounded-2xl p-4 mb-8 shadow-lg focus-within:border-purple-500/50 transition-colors">
            <div class="flex gap-3">
                <div class="w-10 h-10 rounded-full bg-zinc-800 shrink-0 overflow-hidden ring-1 ring-zinc-700" id="mi-avatar-creador">
                    <span class="flex items-center justify-center w-full h-full text-sm">👤</span>
                </div>
                <div class="flex-1">
                    <textarea id="input-post-texto" rows="3" placeholder="¿Qué está sonando en tu cabeza? (Pega un link de YouTube o Spotify aquí)" class="w-full bg-transparent text-white placeholder-zinc-500 text-sm outline-none resize-none mb-2"></textarea>
                    
                    <!-- Previsualización de Imagen -->
                    <div id="preview-container" class="hidden mb-3 relative inline-block">
                        <img id="img-preview" src="" class="max-h-40 rounded-xl border border-zinc-700 object-cover">
                        <button onclick="quitarImagen()" class="absolute top-2 right-2 bg-black/70 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs hover:bg-red-500 transition-colors">✕</button>
                    </div>

                    <div class="flex items-center justify-between border-t border-zinc-800/60 pt-3">
                        <label class="cursor-pointer text-zinc-400 hover:text-purple-400 transition-colors flex items-center gap-1.5 text-xs font-bold">
                            <span class="text-lg">📸</span> Adjuntar foto
                            <input type="file" id="input-post-imagen" accept="image/jpeg, image/png, image/webp" class="hidden" onchange="previsualizarImagen(this)">
                        </label>
                        <button id="btn-publicar" onclick="publicarPost()" class="bg-purple-600 hover:bg-purple-500 text-white text-xs font-bold px-6 py-2 rounded-full transition-colors shadow-[0_0_15px_rgba(147,51,234,0.3)]">
                            Publicar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- FEED DE PUBLICACIONES -->
        <div id="contenedor-posts" class="flex flex-col gap-5">
            <div class="text-center text-zinc-500 text-sm py-10 animate-pulse">Cargando el ecosistema...</div>
        </div>

    </main>

    <script>
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        let miUsuarioId = null;
        let perfilesCache = {}; 
        let archivoComprimido = null;

        // --- INICIALIZACIÓN ---
        async function initFeed() {
            const { data: { user } } = await client.auth.getUser();
            if (user) {
                miUsuarioId = user.id;
                const { data: perfil } = await client.from('perfiles').select('avatar_url').eq('id', user.id).single();
                if (perfil && perfil.avatar_url) {
                    document.getElementById('mi-avatar-creador').innerHTML = `<img src="${perfil.avatar_url}" class="w-full h-full object-cover">`;
                }
            } else {
                // Si no está logueado, ocultamos la caja de publicar
                document.querySelector('.bg-\\[\\#141414\\]').innerHTML = `
                    <div class="text-center p-4">
                        <p class="text-zinc-400 text-sm mb-3">Únete para compartir tu música con el mundo.</p>
                        <a href="register.html" class="inline-block bg-purple-600 text-white text-xs font-bold px-6 py-2 rounded-full shadow-[0_0_15px_rgba(147,51,234,0.3)]">Crear Cuenta</a>
                    </div>
                `;
            }

            cargarPosts();
        }

        // --- EL MOTOR DE COMPRESIÓN DE IMÁGENES ---
        function previsualizarImagen(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                document.getElementById('img-preview').src = event.target.result;
                document.getElementById('preview-container').classList.remove('hidden');
                
                // Comprimir la imagen mágicamente
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1080; // Calidad HD pero optimizada
                    const MAX_HEIGHT = 1080;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Comprimir a JPEG calidad 70% (Baja el peso brutalmente)
                    canvas.toBlob((blob) => {
                        archivoComprimido = new File([blob], file.name.split('.')[0] + ".jpg", { type: 'image/jpeg' });
                    }, 'image/jpeg', 0.7);
                };
            };
        }

        function quitarImagen() {
            document.getElementById('input-post-imagen').value = '';
            document.getElementById('preview-container').classList.add('hidden');
            archivoComprimido = null;
        }

        // --- EL DETECTOR MÁGICO DE LINKS DEFINITIVO ---
        function procesarTextoConEmbeds(texto) {
            if (!texto) return '';

            // 1. Escapar HTML para evitar hackeos
            let html = texto.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            // 2. Reemplazar saltos de línea
            html = html.replace(/\n/g, '<br>');

            // 3. Escáner para Spotify (Ignora basura extra al final del link)
            const spotifyRegex = /https:\/\/open\.spotify\.com\/(?:intl-[a-z]{2}\/)?(track|album|playlist)\/([a-zA-Z0-9]+)(?:\S*)?/g;
            html = html.replace(spotifyRegex, (match, tipo, id) => {
                return `<div class="w-full mt-3 rounded-xl overflow-hidden shadow-[0_0_15px_rgba(29,185,84,0.1)]"><iframe src="https://open.spotify.com/embed/${tipo}/${id}" width="100%" height="152" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe></div>`;
            });

            // 4. Escáner para SoundCloud
            const soundcloudRegex = /(https:\/\/soundcloud\.com\/[a-zA-Z0-9_-]+\/[a-zA-Z0-9_-]+)(?:\S*)?/g;
            html = html.replace(soundcloudRegex, (match, url) => {
                return `<div class="w-full mt-3 rounded-xl overflow-hidden shadow-[0_0_15px_rgba(124,58,237,0.15)]"><iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&color=%237c3aed&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false"></iframe></div>`;
            });

            // 5. Escáner para YouTube
            const youtubeRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})(?:\S*)?/gi;
            html = html.replace(youtubeRegex, '<div class="aspect-video w-full rounded-xl overflow-hidden mt-3 border border-red-900/30 shadow-[0_0_15px_rgba(220,38,38,0.1)]"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/$1" frameborder="0" allowfullscreen></iframe></div>');

            return html;
        }

        function tiempoTranscurrido(fechaStr) {
            const segundos = Math.floor((new Date() - new Date(fechaStr)) / 1000);
            if (segundos < 60) return "Hace un momento";
            if (segundos < 3600) return `Hace ${Math.floor(segundos / 60)} min`;
            if (segundos < 86400) return `Hace ${Math.floor(segundos / 3600)} horas`;
            return `Hace ${Math.floor(segundos / 86400)} días`;
        }

        // --- SUBIR PUBLICACIÓN ---
        window.publicarPost = async function() {
            const btn = document.getElementById('btn-publicar');
            const textoRaw = document.getElementById('input-post-texto').value.trim();
            
            if (!textoRaw && !archivoComprimido) return alert("Escribe algo o sube una foto.");

            btn.disabled = true; btn.textContent = "Subiendo...";

            let imageUrlSubida = null;

            // 1. Subir imagen si hay
            if (archivoComprimido) {
                const filePath = `${miUsuarioId}-${Date.now()}.jpg`;
                const { error: uploadError } = await client.storage.from('feed_images').upload(filePath, archivoComprimido);
                if (!uploadError) {
                    const { data: { publicUrl } } = client.storage.from('feed_images').getPublicUrl(filePath);
                    imageUrlSubida = publicUrl;
                }
            }

            // 2. Insertar en la tabla posts
            const { error } = await client.from('posts').insert([{
                usuario_id: miUsuarioId,
                contenido: textoRaw,
                imagen_url: imageUrlSubida
            }]);

            btn.disabled = false; btn.textContent = "Publicar";

            if (error) alert("Error: " + error.message);
            else {
                document.getElementById('input-post-texto').value = '';
                quitarImagen();
                cargarPosts(); // Recargar el muro
            }
        }

        // --- CARGAR EL MURO ---
        async function cargarPosts() {
            // 1. Traer posts
            const { data: posts } = await client.from('posts').select('*').order('fecha', { ascending: false }).limit(50);
            
            // 2. Traer perfiles (Diccionario para saber quién es quién)
            const { data: perfiles } = await client.from('perfiles').select('id, nombre_display, username, avatar_url, tipo');
            perfiles.forEach(p => { perfilesCache[p.id] = p; });

            const cont = document.getElementById('contenedor-posts');
            if (!posts || posts.length === 0) {
                cont.innerHTML = '<div class="text-center text-zinc-500 text-sm py-10">El muro está vacío. ¡Sé el primero en publicar!</div>';
                return;
            }

            // 3. Armar las tarjetas
            cont.innerHTML = posts.map(post => {
                const autor = perfilesCache[post.usuario_id] || { nombre_display: 'Usuario', username: 'desconocido', avatar_url: '', tipo: 'usuario' };
                const contenidoMagico = procesarTextoConEmbeds(post.contenido);
                
                // Si hay foto, la ponemos hermosa
                const imagenHtml = post.imagen_url 
                    ? `<div class="mt-3 rounded-2xl overflow-hidden border border-zinc-800"><img src="${post.imagen_url}" class="w-full h-auto max-h-[600px] object-cover hover:scale-105 transition-transform duration-500"></div>` 
                    : '';

                // Botón de basura (Solo visible si el post es tuyo)
                const botonBorrar = (post.usuario_id === miUsuarioId)
                    ? `<button onclick="borrarPost(${post.id})" class="text-red-500 hover:text-red-400 text-xs bg-red-900/10 hover:bg-red-900/30 w-8 h-8 rounded-full flex items-center justify-center transition-colors opacity-0 group-hover:opacity-100">🗑️</button>`
                    : '';

                return `
                <div class="bg-[#141414] border border-zinc-800/80 rounded-2xl p-4 md:p-5 fade-in group hover:border-zinc-700 transition-colors shadow-lg">
                    <div class="flex justify-between items-start mb-3">
                        <a href="visor.html?id=${post.usuario_id}" class="flex gap-3 items-center group/autor cursor-pointer">
                            <div class="w-10 h-10 rounded-full bg-zinc-800 shrink-0 overflow-hidden ring-1 ring-zinc-700 group-hover/autor:ring-purple-500 transition-colors">
                                ${autor.avatar_url ? `<img src="${autor.avatar_url}" class="w-full h-full object-cover">` : `<span class="flex items-center justify-center w-full h-full text-sm">👤</span>`}
                            </div>
                            <div>
                                <h4 class="font-bold text-white text-sm group-hover/autor:text-purple-400 transition-colors flex items-center gap-1.5">
                                    ${autor.nombre_display}
                                    <span class="text-[8px] bg-zinc-800 border border-zinc-700 text-zinc-400 px-1.5 py-0.5 rounded uppercase tracking-widest">${autor.tipo}</span>
                                </h4>
                                <p class="text-zinc-500 text-xs flex gap-2">
                                    @${autor.username} • ${tiempoTranscurrido(post.fecha)}
                                </p>
                            </div>
                        </a>
                        ${botonBorrar}
                    </div>
                    
                    <div class="text-zinc-300 text-sm leading-relaxed whitespace-pre-wrap ml-0 md:ml-13">${contenidoMagico}</div>
                    
                    <div class="ml-0 md:ml-13">
                        ${imagenHtml}
                    </div>
                </div>
                `;
            }).join('');
        }

        window.borrarPost = async function(id) {
            if (confirm("¿Borrar esta publicación?")) {
                await client.from('posts').delete().eq('id', id);
                cargarPosts();
            }
        }

        initFeed();
    </script>
</body>
</html>
