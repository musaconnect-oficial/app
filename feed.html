<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed | ArtsForo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }

        #progress-bar { position:fixed; top:0; left:0; height:3px; width:0%; background:linear-gradient(90deg,#f97316,#dc2626); z-index:9999; transition:width 0.3s ease; }

        .media-cuadrada { position:relative; width:100%; padding-bottom:100%; background:#000; overflow:hidden; border-radius:12px; }
        .media-cuadrada img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
        .media-cuadrada video { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#000; }

        .corazon-btn.activo svg { fill:#ef4444; stroke:#ef4444; }
        .fade-in { animation:fadeIn 0.4s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        .skeleton { background:linear-gradient(90deg,#1a1a1a 25%,#252525 50%,#1a1a1a 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* FREEMIUM: blur para comentarios sin cuenta */
        .comentarios-blur { filter:blur(3px); pointer-events:none; user-select:none; max-height:60px; overflow:hidden; }

        .banner-registro { background:linear-gradient(135deg,rgba(220,38,38,0.12),rgba(168,85,247,0.12)); border:1px solid rgba(220,38,38,0.25); border-radius:12px; padding:14px 16px; text-align:center; }

        .badge-artista { background:linear-gradient(135deg,#dc2626,#991b1b); font-size:9px; font-weight:900; letter-spacing:0.1em; text-transform:uppercase; padding:2px 7px; border-radius:999px; color:#fff; }
        .badge-compositor { background:linear-gradient(135deg,#7c3aed,#4c1d95); font-size:9px; font-weight:900; letter-spacing:0.1em; text-transform:uppercase; padding:2px 7px; border-radius:999px; color:#fff; }
    </style>
</head>
<body class="bg-[#0e0e0e] text-white min-h-screen pb-20">

    <div id="progress-bar"></div>

    <!-- HEADER -->
    <header class="bg-[#0e0e0e] border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-zinc-400 hover:text-white text-sm transition-colors flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Inicio
            </a>
            <div class="text-center">
                <h1 class="text-base font-black tracking-tight">ARTS<span class="text-orange-500">FEED</span></h1>
                <p class="text-[10px] text-zinc-600">artsforo</p>
            </div>
            <div id="header-derecho">
                <a href="foro.html" class="text-zinc-400 hover:text-white text-xs font-bold transition-colors">💬 Foro</a>
            </div>
        </div>
    </header>

    <!-- POSTS -->
    <main class="max-w-xl mx-auto px-4 pt-5">
        <div id="skeletons" class="flex flex-col gap-6">
            <div class="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden">
                <div class="flex items-center gap-3 p-4"><div class="skeleton w-10 h-10 rounded-full"></div><div class="flex-1"><div class="skeleton h-3 w-32 mb-2"></div><div class="skeleton h-2 w-20"></div></div></div>
                <div class="px-4 pb-3"><div class="skeleton" style="padding-bottom:100%;border-radius:12px;"></div></div>
            </div>
            <div class="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden">
                <div class="flex items-center gap-3 p-4"><div class="skeleton w-10 h-10 rounded-full"></div><div class="flex-1"><div class="skeleton h-3 w-32 mb-2"></div><div class="skeleton h-2 w-20"></div></div></div>
                <div class="px-4 pb-3"><div class="skeleton h-24 rounded-xl"></div></div>
            </div>
        </div>
        <div id="contenedor-posts" class="flex flex-col gap-6 hidden"></div>
    </main>

    <script>
    (function() {
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let usuarioActual = null;
        let perfilActual = null;

        const bar = document.getElementById('progress-bar');
        let p = 0;
        const pInt = setInterval(() => { p = Math.min(p+20, 80); bar.style.width = p+'%'; }, 150);
        function finBar() { clearInterval(pInt); bar.style.width='100%'; setTimeout(()=>bar.style.opacity='0',300); }

        async function init() {
            const { data: { user } } = await client.auth.getUser();
            usuarioActual = user;
            if (user) {
                const { data: pf } = await client.from('perfiles').select('*').eq('id', user.id).single();
                perfilActual = pf;
                // Mostrar link al perfil en header
                document.getElementById('header-derecho').innerHTML = `
                    <div class="flex items-center gap-2">
                        <a href="profile.html" class="w-7 h-7 rounded-full bg-red-700 flex items-center justify-center text-xs font-black hover:opacity-80 transition-opacity">${pf ? pf.nombre_display.charAt(0).toUpperCase() : 'U'}</a>
                        <a href="foro.html" class="text-zinc-400 hover:text-white text-xs font-bold transition-colors">💬</a>
                    </div>`;
            }
            await cargarPosts();
        }

        async function cargarPosts() {
            const [{ data: posts }, { data: comentarios }] = await Promise.all([
                client.from('feed_posts').select('*, perfiles(nombre_display, username, tipo, verificado, avatar_url)').order('created_at', { ascending: false }),
                client.from('feed_comentarios').select('*, perfiles(nombre_display, username, tipo)')
            ]);

            // Likes del usuario actual
            let misLikes = new Set();
            if (usuarioActual) {
                const { data: lks } = await client.from('feed_likes').select('post_id').eq('user_id', usuarioActual.id);
                if (lks) lks.forEach(l => misLikes.add(l.post_id));
            }

            document.getElementById('skeletons').classList.add('hidden');
            const contenedor = document.getElementById('contenedor-posts');
            contenedor.classList.remove('hidden');
            finBar();

            if (!posts || posts.length === 0) {
                contenedor.innerHTML = '<div class="text-center text-zinc-600 py-20 text-sm">No hay publicaciones todavía.</div>';
                return;
            }

            contenedor.innerHTML = posts.map(post => {
                const pf = post.perfiles || {};
                const nombre = pf.nombre_display || 'Artista';
                const tipo = pf.tipo || 'fan';
                const badgeTipo = tipo === 'artista' ? '<span class="badge-artista">Artista</span>' : tipo === 'compositor' ? '<span class="badge-compositor">Compositor</span>' : '';
                const fecha = new Date(post.created_at).toLocaleDateString('es-PE', { day:'numeric', month:'short' });
                const yaLike = misLikes.has(post.id);

                let mediaHTML = '';
                if (post.media_url) {
                    const esVideo = post.media_url.match(/\.(mp4|webm|mov)/i);
                    mediaHTML = esVideo
                        ? `<div class="px-0 pb-1"><div class="media-cuadrada border border-zinc-800"><video controls playsinline preload="metadata"><source src="${post.media_url}"></video></div></div>`
                        : `<div class="px-0 pb-1"><div class="media-cuadrada"><img src="${post.media_url}" alt="Post" loading="lazy"></div></div>`;
                }

                const comsFiltrados = (comentarios || []).filter(c => c.post_id === post.id);

                // Render comentarios con freemium
                let comsHTML = '';
                const comsVer = usuarioActual ? comsFiltrados : comsFiltrados.slice(0, 1);
                const comsVisibles = comsVer.map(c => {
                    const cp = c.perfiles || {};
                    const cn = cp.nombre_display || 'Usuario';
                    return `
                    <div class="flex gap-2 py-2 border-b border-zinc-800 last:border-0">
                        <a href="profile.html?u=${cp.username}" class="w-6 h-6 rounded-full bg-zinc-700 flex items-center justify-center text-[10px] font-black flex-shrink-0 mt-0.5 hover:opacity-80 transition-opacity">${cn.charAt(0).toUpperCase()}</a>
                        <div><a href="profile.html?u=${cp.username}" class="text-xs font-bold text-zinc-300 hover:text-white transition-colors">${cn} </a><span class="text-xs text-zinc-400">${c.mensaje}</span></div>
                    </div>`;
                }).join('') || '<p class="text-xs text-zinc-700 italic py-2">Sé el primero en comentar.</p>';

                const bannerComs = (!usuarioActual && comsFiltrados.length > 1) ? `
                <div class="banner-registro mx-4 mb-2">
                    <p class="text-xs font-bold text-white mb-1">Ver todos los comentarios</p>
                    <div class="flex gap-2 justify-center">
                        <a href="register.html" class="bg-red-600 text-white text-xs font-bold px-4 py-1.5 rounded-full hover:bg-red-500 transition-colors">Registrarse</a>
                        <a href="login.html" class="bg-zinc-700 text-white text-xs font-bold px-4 py-1.5 rounded-full hover:bg-zinc-600 transition-colors">Ingresar</a>
                    </div>
                </div>` : '';

                const zonaComentarHTML = usuarioActual ? `
                <div class="px-3 pb-3 flex gap-2">
                    <input type="text" id="msg-feed-${post.id}" placeholder="Comentar..." maxlength="200"
                        class="flex-1 bg-zinc-800 border border-zinc-700 text-white text-xs rounded-full px-3 py-2 focus:outline-none focus:border-orange-500 placeholder-zinc-600">
                    <button onclick="window.comentarFeed(${post.id})"
                        class="bg-orange-600 hover:bg-orange-500 text-white text-xs font-bold px-4 py-2 rounded-full transition-colors flex-shrink-0">→</button>
                </div>` : '';

                return `
                <article class="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden fade-in" id="post-${post.id}">
                    <div class="flex items-center gap-3 px-4 py-3">
                        <a href="profile.html?u=${pf.username}" class="flex-shrink-0">
                            ${pf.avatar_url
                                ? `<img src="${pf.avatar_url}" class="w-9 h-9 rounded-full object-cover hover:opacity-80 transition-opacity" alt="${nombre}">`
                                : `<div class="w-9 h-9 rounded-full bg-gradient-to-br from-red-600 to-red-900 flex items-center justify-center font-black text-xs hover:opacity-80 transition-opacity">${nombre.charAt(0).toUpperCase()}</div>`
                            }
                        </a>
                        <div class="flex-1">
                            <div class="flex items-center gap-1.5">
                                <a href="profile.html?u=${pf.username}" class="font-bold text-sm text-white hover:text-red-400 transition-colors leading-none">${nombre}</a>
                                ${badgeTipo}
                                ${pf.verificado ? '<svg class="w-3.5 h-3.5 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>' : ''}
                            </div>
                            <p class="text-[10px] text-zinc-500 mt-0.5">${fecha}</p>
                        </div>
                    </div>

                    ${post.texto ? `<p class="px-4 pb-3 text-sm text-zinc-200 leading-relaxed">${post.texto}</p>` : ''}
                    ${mediaHTML}

                    <div class="px-4 py-2 flex items-center gap-5 border-t border-zinc-800">
                        <button onclick="window.toggleLike(${post.id})" class="corazon-btn flex items-center gap-1.5 text-zinc-400 hover:text-red-500 transition-colors ${yaLike ? 'activo' : ''}" id="like-${post.id}">
                            <svg class="w-5 h-5" fill="${yaLike ? '#ef4444' : 'none'}" stroke="${yaLike ? '#ef4444' : 'currentColor'}" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                            <span class="text-sm font-bold" id="likes-count-${post.id}">${post.likes || 0}</span>
                        </button>
                        <button onclick="window.toggleComs('${post.id}')" class="flex items-center gap-1.5 text-zinc-400 hover:text-white transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                            <span class="text-sm font-bold">${comsFiltrados.length}</span>
                        </button>
                        <button onclick="window.compartirPost(${post.id})" class="flex items-center gap-1.5 text-zinc-400 hover:text-white transition-colors ml-auto">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                        </button>
                    </div>

                    <div id="coms-${post.id}" class="hidden border-t border-zinc-800">
                        <div class="px-4 py-2 max-h-48 overflow-y-auto" id="lista-coms-${post.id}">${comsVisibles}</div>
                        ${bannerComs}
                        ${zonaComentarHTML}
                    </div>
                </article>`;
            }).join('');
        }

        window.toggleComs = function(id) { document.getElementById('coms-' + id).classList.toggle('hidden'); };

        window.toggleLike = async function(postId) {
            if (!usuarioActual) { window.location.href = 'register.html'; return; }
            const btn = document.getElementById('like-' + postId);
            const countEl = document.getElementById('likes-count-' + postId);
            const { data: existeLike } = await client.from('feed_likes').select('id').eq('post_id', postId).eq('user_id', usuarioActual.id).maybeSingle();
            const { data: post } = await client.from('feed_posts').select('likes').eq('id', postId).single();
            if (!post) return;

            if (existeLike) {
                await client.from('feed_likes').delete().eq('post_id', postId).eq('user_id', usuarioActual.id);
                const nuevos = Math.max(0, (post.likes||0) - 1);
                await client.from('feed_posts').update({ likes: nuevos }).eq('id', postId);
                countEl.textContent = nuevos;
                btn.classList.remove('activo');
                const svg = btn.querySelector('svg');
                svg.setAttribute('fill','none'); svg.setAttribute('stroke','currentColor');
            } else {
                await client.from('feed_likes').insert([{ post_id: postId, user_id: usuarioActual.id }]);
                const nuevos = (post.likes||0) + 1;
                await client.from('feed_posts').update({ likes: nuevos }).eq('id', postId);
                countEl.textContent = nuevos;
                btn.classList.add('activo');
                const svg = btn.querySelector('svg');
                svg.setAttribute('fill','#ef4444'); svg.setAttribute('stroke','#ef4444');
            }
        };

        window.comentarFeed = async function(postId) {
            if (!usuarioActual || !perfilActual) return;
            const mensaje = document.getElementById('msg-feed-' + postId).value.trim();
            if (!mensaje) return;
            await client.from('feed_comentarios').insert([{ post_id: postId, autor_id: usuarioActual.id, mensaje }]);
            document.getElementById('msg-feed-' + postId).value = '';
            const { data: coms } = await client.from('feed_comentarios').select('*, perfiles(nombre_display, username, tipo)').eq('post_id', postId);
            const lista = document.getElementById('lista-coms-' + postId);
            lista.innerHTML = (coms || []).map(c => {
                const cp = c.perfiles || {};
                const cn = cp.nombre_display || 'Usuario';
                return `
                <div class="flex gap-2 py-2 border-b border-zinc-800 last:border-0">
                    <a href="profile.html?u=${cp.username}" class="w-6 h-6 rounded-full bg-zinc-700 flex items-center justify-center text-[10px] font-black flex-shrink-0 mt-0.5">${cn.charAt(0).toUpperCase()}</a>
                    <div><a href="profile.html?u=${cp.username}" class="text-xs font-bold text-zinc-300 hover:text-white">${cn} </a><span class="text-xs text-zinc-400">${c.mensaje}</span></div>
                </div>`;
            }).join('');
            lista.scrollTop = lista.scrollHeight;
        };

        window.compartirPost = function(postId) {
            const url = window.location.origin + window.location.pathname + '#post-' + postId;
            if (navigator.share) {
                navigator.share({ title: 'ArtsForo', url });
            } else {
                navigator.clipboard.writeText(url).then(() => alert('Enlace copiado ✓'));
            }
        };

        init();
    })();
    </script>
</body>
</html>
