<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foro | Yuvng Miuze</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }

        #progress-bar {
            position: fixed; top: 0; left: 0; height: 3px; width: 0%;
            background: linear-gradient(90deg, #dc2626, #a855f7);
            z-index: 9999; transition: width 0.3s ease;
        }

        .fade-in { animation: fadeIn 0.35s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        /* BADGE ARTISTA */
        .badge-artista {
            background: linear-gradient(135deg, #dc2626, #991b1b);
            font-size: 9px; font-weight: 900; letter-spacing: 0.1em;
            text-transform: uppercase; padding: 2px 8px; border-radius: 999px;
        }

        /* SKELETON */
        .skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite; border-radius: 8px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        textarea:focus, input:focus { outline: none; }
    </style>
</head>
<body class="bg-[#0e0e0e] text-white min-h-screen pb-20">

    <div id="progress-bar"></div>

    <!-- HEADER -->
    <header class="bg-[#0e0e0e] border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-zinc-400 hover:text-white text-sm transition-colors flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Inicio
            </a>
            <div class="text-center">
                <h1 class="text-base font-black tracking-tight">FORO <span class="text-red-500">FANS</span></h1>
                <p class="text-[10px] text-zinc-600" id="contador-hilos">cargando...</p>
            </div>
            <button onclick="window.mostrarFormHilo()" class="bg-red-600 hover:bg-red-500 text-white text-xs font-bold px-4 py-2 rounded-full transition-colors">
                + Nuevo hilo
            </button>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 pt-5">

        <!-- FORM NUEVO HILO -->
        <div id="form-nuevo-hilo" class="hidden mb-5 bg-zinc-900 border border-red-900 rounded-2xl p-5 fade-in">
            <p class="text-xs font-black text-red-400 uppercase tracking-widest mb-4">Abrir nuevo hilo</p>
            <div class="space-y-3">
                <input type="text" id="hilo-autor" placeholder="Tu nombre o apodo" maxlength="40"
                    class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-xl px-4 py-3 focus:border-red-500 placeholder-zinc-600">
                <input type="text" id="hilo-titulo" placeholder="Título del hilo" maxlength="100"
                    class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-xl px-4 py-3 focus:border-red-500 placeholder-zinc-600">
                <textarea id="hilo-contenido" rows="3" placeholder="Mensaje inicial..." maxlength="500"
                    class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-xl px-4 py-3 focus:border-red-500 placeholder-zinc-600 resize-none"></textarea>
                <div class="flex gap-2">
                    <button onclick="window.publicarHilo()" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl transition-colors text-sm">Publicar hilo</button>
                    <button onclick="window.ocultarFormHilo()" class="px-5 bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3 rounded-xl transition-colors text-sm">Cancelar</button>
                </div>
            </div>
        </div>

        <!-- LISTA DE HILOS -->
        <div id="vista-lista">
            <!-- Skeletons -->
            <div id="skeletons-foro" class="flex flex-col gap-3">
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5"><div class="skeleton h-4 w-3/4 mb-2"></div><div class="skeleton h-3 w-full mb-3"></div><div class="skeleton h-3 w-1/3"></div></div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5"><div class="skeleton h-4 w-2/3 mb-2"></div><div class="skeleton h-3 w-full mb-3"></div><div class="skeleton h-3 w-1/4"></div></div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5"><div class="skeleton h-4 w-4/5 mb-2"></div><div class="skeleton h-3 w-full mb-3"></div><div class="skeleton h-3 w-1/3"></div></div>
            </div>
            <div id="lista-hilos" class="flex flex-col gap-3 hidden"></div>
        </div>

        <!-- HILO ABIERTO -->
        <div id="vista-hilo" class="hidden">
            <button onclick="window.volverALista()" class="text-zinc-400 hover:text-white text-sm mb-5 flex items-center gap-1 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Volver al foro
            </button>
            <div id="detalle-hilo" class="mb-4"></div>
            <div id="respuestas-hilo" class="flex flex-col gap-3 mb-5"></div>

            <!-- Responder -->
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
                <p class="text-xs font-black text-zinc-400 uppercase tracking-widest mb-3">Tu respuesta</p>
                <div class="space-y-3">
                    <input type="text" id="resp-autor" placeholder="Tu nombre o apodo" maxlength="40"
                        class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-xl px-4 py-3 focus:border-red-500 placeholder-zinc-600">
                    <textarea id="resp-contenido" rows="3" placeholder="Escribe aquí..." maxlength="500"
                        class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-xl px-4 py-3 focus:border-red-500 placeholder-zinc-600 resize-none"></textarea>
                    <button onclick="window.responderHilo()" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl transition-colors text-sm">Enviar respuesta</button>
                </div>
            </div>
        </div>
    </main>

    <script>
    (function() {
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);
        let hiloActualId = null;

        // Barra de progreso
        const bar = document.getElementById('progress-bar');
        let pp = 0;
        const pInt = setInterval(() => { pp = Math.min(pp+20, 80); bar.style.width = pp+'%'; }, 150);
        function finBar() { clearInterval(pInt); bar.style.width='100%'; setTimeout(()=>bar.style.opacity='0',300); }

        // Colores para avatares
        const colores = ['from-red-700 to-red-900','from-purple-700 to-purple-900','from-blue-700 to-blue-900','from-green-700 to-green-900','from-orange-700 to-orange-900','from-pink-700 to-pink-900'];
        function colorAvatar(str) { let h=0; for(let c of str) h=c.charCodeAt(0)+((h<<5)-h); return colores[Math.abs(h)%colores.length]; }

        // ── FORM ─────────────────────────────────────────────────────
        window.mostrarFormHilo = function() {
            document.getElementById('form-nuevo-hilo').classList.remove('hidden');
            document.getElementById('hilo-autor').focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        window.ocultarFormHilo = function() {
            document.getElementById('form-nuevo-hilo').classList.add('hidden');
            ['hilo-autor','hilo-titulo','hilo-contenido'].forEach(id => document.getElementById(id).value = '');
        };

        window.publicarHilo = async function() {
            const autor = document.getElementById('hilo-autor').value.trim();
            const titulo = document.getElementById('hilo-titulo').value.trim();
            const contenido = document.getElementById('hilo-contenido').value.trim();
            if (!autor || !titulo || !contenido) return alert('Completa todos los campos.');
            const { error } = await client.from('foro_hilos').insert([{ autor, titulo, contenido }]);
            if (error) { alert('Error: ' + error.message); return; }
            window.ocultarFormHilo();
            cargarHilos();
        };

        // ── LISTA ─────────────────────────────────────────────────────
        async function cargarHilos() {
            const { data: hilos } = await client.from('foro_hilos').select('*').order('created_at', { ascending: false });
            const { data: resp } = await client.from('foro_respuestas').select('hilo_id');

            document.getElementById('skeletons-foro').classList.add('hidden');
            const lista = document.getElementById('lista-hilos');
            lista.classList.remove('hidden');
            finBar();

            if (!hilos || hilos.length === 0) {
                lista.innerHTML = '<div class="text-center text-zinc-600 py-16 text-sm">No hay hilos todavía.<br><span class="text-zinc-700">¡Abre el primero!</span></div>';
                document.getElementById('contador-hilos').textContent = '0 hilos';
                return;
            }

            document.getElementById('contador-hilos').textContent = hilos.length + ' hilos';

            const conteo = {};
            (resp||[]).forEach(r => { conteo[r.hilo_id] = (conteo[r.hilo_id]||0)+1; });

            lista.innerHTML = hilos.map(h => {
                const fecha = new Date(h.created_at).toLocaleDateString('es-PE', { day: 'numeric', month: 'short' });
                const nR = conteo[h.id] || 0;
                const col = colorAvatar(h.autor);
                return `
                <div onclick="window.abrirHilo(${h.id})"
                    class="bg-zinc-900 border border-zinc-800 hover:border-zinc-600 rounded-2xl p-4 cursor-pointer transition-all fade-in group">
                    <div class="flex gap-3">
                        <div class="w-9 h-9 rounded-full bg-gradient-to-br ${col} flex items-center justify-center text-sm font-black flex-shrink-0 mt-0.5">
                            ${h.autor.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-white text-sm leading-snug group-hover:text-red-400 transition-colors mb-1">${h.titulo}</h3>
                            <p class="text-zinc-500 text-xs truncate mb-2">${h.contenido}</p>
                            <div class="flex items-center gap-3 text-[10px] text-zinc-600">
                                <span class="font-bold text-zinc-500">${h.autor}</span>
                                <span>·</span>
                                <span>${fecha}</span>
                                <span>·</span>
                                <span>${nR} resp.</span>
                            </div>
                        </div>
                        <svg class="w-4 h-4 text-zinc-700 flex-shrink-0 mt-1 group-hover:text-zinc-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                    </div>
                </div>`;
            }).join('');
        }

        // ── ABRIR HILO ────────────────────────────────────────────────
        window.abrirHilo = async function(hiloId) {
            hiloActualId = hiloId;
            document.getElementById('vista-lista').classList.add('hidden');
            document.getElementById('form-nuevo-hilo').classList.add('hidden');
            document.getElementById('vista-hilo').classList.remove('hidden');
            document.getElementById('detalle-hilo').innerHTML = '<div class="skeleton h-32 rounded-2xl mb-4"></div>';

            const { data: hilo } = await client.from('foro_hilos').select('*').eq('id', hiloId).single();
            const { data: respuestas } = await client.from('foro_respuestas').select('*').eq('hilo_id', hiloId).order('created_at', { ascending: true });

            const fecha = new Date(hilo.created_at).toLocaleDateString('es-PE', { day: 'numeric', month: 'long', year: 'numeric' });
            const col = colorAvatar(hilo.autor);

            document.getElementById('detalle-hilo').innerHTML = `
            <div class="bg-zinc-900 border border-red-900 rounded-2xl p-5 mb-1">
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-9 h-9 rounded-full bg-gradient-to-br ${col} flex items-center justify-center text-sm font-black flex-shrink-0">
                        ${hilo.autor.charAt(0).toUpperCase()}
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <p class="font-bold text-sm text-white">${hilo.autor}</p>
                            <span class="badge-artista text-white" style="display:none" id="badge-creador">CREADOR</span>
                        </div>
                        <p class="text-[10px] text-zinc-500">${fecha}</p>
                    </div>
                    <span class="bg-zinc-800 text-zinc-400 text-[9px] font-bold px-2 py-0.5 rounded-full uppercase">#1</span>
                </div>
                <h2 class="text-xl font-black text-white mb-2">${hilo.titulo}</h2>
                <p class="text-sm text-zinc-300 leading-relaxed">${hilo.contenido}</p>
            </div>`;

            renderizarRespuestas(respuestas || []);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function renderizarRespuestas(respuestas) {
            const cont = document.getElementById('respuestas-hilo');
            if (respuestas.length === 0) {
                cont.innerHTML = '<p class="text-xs text-zinc-700 italic text-center py-4">Nadie ha respondido todavía.</p>';
                return;
            }
            cont.innerHTML = respuestas.map((r, i) => {
                const fecha = new Date(r.created_at).toLocaleDateString('es-PE', { day: 'numeric', month: 'short' });
                const col = colorAvatar(r.autor);
                return `
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 fade-in">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br ${col} flex items-center justify-center text-xs font-black flex-shrink-0">
                            ${r.autor.charAt(0).toUpperCase()}
                        </div>
                        <span class="text-xs font-bold text-zinc-300">${r.autor}</span>
                        <span class="text-[10px] text-zinc-600 ml-auto">#${i+2} · ${fecha}</span>
                    </div>
                    <p class="text-sm text-zinc-400 leading-relaxed">${r.contenido}</p>
                </div>`;
            }).join('');
        }

        window.responderHilo = async function() {
            const autor = document.getElementById('resp-autor').value.trim();
            const contenido = document.getElementById('resp-contenido').value.trim();
            if (!autor || !contenido) return alert('Escribe tu nombre y una respuesta.');
            const { error } = await client.from('foro_respuestas').insert([{ hilo_id: hiloActualId, autor, contenido }]);
            if (error) { alert('Error: ' + error.message); return; }
            document.getElementById('resp-autor').value = '';
            document.getElementById('resp-contenido').value = '';
            const { data: resp } = await client.from('foro_respuestas').select('*').eq('hilo_id', hiloActualId).order('created_at', { ascending: true });
            renderizarRespuestas(resp || []);
            document.getElementById('respuestas-hilo').lastElementChild?.scrollIntoView({ behavior: 'smooth' });
        };

        window.volverALista = function() {
            hiloActualId = null;
            document.getElementById('vista-hilo').classList.add('hidden');
            document.getElementById('vista-lista').classList.remove('hidden');
        };

        cargarHilos();
    })();
    </script>
</body>
</html>
