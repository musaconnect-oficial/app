<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foro | Yuvng Miuze</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .hilo-activo { border-color: #dc2626 !important; }
        textarea:focus, input:focus { outline: none; }
    </style>
</head>
<body class="bg-[#0e0e0e] text-white min-h-screen pb-20">

    <!-- HEADER -->
    <header class="bg-gradient-to-b from-zinc-900 to-[#0e0e0e] border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-zinc-400 hover:text-white text-sm transition-colors">← Inicio</a>
            <h1 class="text-lg font-black tracking-tight">FORO <span class="text-red-500">FANS</span></h1>
            <button onclick="window.mostrarFormHilo()" class="bg-red-600 hover:bg-red-500 text-white text-xs font-bold px-4 py-2 rounded-full transition-colors">
                + Nuevo hilo
            </button>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 pt-6">

        <!-- FORMULARIO NUEVO HILO (oculto por default) -->
        <div id="form-nuevo-hilo" class="hidden mb-6 bg-zinc-900 border border-red-800 rounded-2xl p-5 fade-in">
            <h2 class="font-bold text-red-400 mb-4 text-sm uppercase tracking-widest">Abrir nuevo hilo</h2>
            <div class="space-y-3">
                <input type="text" id="hilo-autor" placeholder="Tu nombre o apodo" maxlength="40"
                    class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-xl px-4 py-3 focus:border-red-500 placeholder-zinc-600">
                <input type="text" id="hilo-titulo" placeholder="Título del hilo (ej: ¿Cuál es su canción favorita?)" maxlength="100"
                    class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-xl px-4 py-3 focus:border-red-500 placeholder-zinc-600">
                <textarea id="hilo-contenido" rows="3" placeholder="Escribe tu mensaje inicial..." maxlength="500"
                    class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-xl px-4 py-3 focus:border-red-500 placeholder-zinc-600 resize-none"></textarea>
                <div class="flex gap-3">
                    <button onclick="window.publicarHilo()" class="flex-1 bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl transition-colors text-sm">
                        Publicar hilo
                    </button>
                    <button onclick="window.ocultarFormHilo()" class="px-6 bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3 rounded-xl transition-colors text-sm">
                        Cancelar
                    </button>
                </div>
            </div>
        </div>

        <!-- VISTA: LISTA DE HILOS -->
        <div id="vista-lista">
            <p class="text-xs text-zinc-600 uppercase tracking-widest mb-4 font-bold">Todos los hilos</p>
            <div id="lista-hilos" class="flex flex-col gap-3">
                <div class="text-center text-zinc-600 py-16 text-sm">Cargando hilos...</div>
            </div>
        </div>

        <!-- VISTA: HILO ABIERTO -->
        <div id="vista-hilo" class="hidden">
            <button onclick="window.volverALista()" class="text-zinc-400 hover:text-white text-sm mb-5 flex items-center gap-1 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Volver al foro
            </button>
            <div id="detalle-hilo" class="mb-6"></div>
            <div id="respuestas-hilo" class="flex flex-col gap-3 mb-6"></div>

            <!-- Responder -->
            <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-5">
                <p class="text-xs font-bold text-zinc-400 mb-3 uppercase tracking-widest">Responder</p>
                <div class="space-y-3">
                    <input type="text" id="resp-autor" placeholder="Tu nombre o apodo" maxlength="40"
                        class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-xl px-4 py-3 focus:border-red-500 placeholder-zinc-600">
                    <textarea id="resp-contenido" rows="3" placeholder="Tu respuesta..." maxlength="500"
                        class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-xl px-4 py-3 focus:border-red-500 placeholder-zinc-600 resize-none"></textarea>
                    <button onclick="window.responderHilo()" class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3 rounded-xl transition-colors text-sm">
                        Enviar respuesta
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
    (function() {
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);
        let hiloActualId = null;

        // ─── FORMULARIO NUEVO HILO ───────────────────────────────────
        window.mostrarFormHilo = function() {
            document.getElementById('form-nuevo-hilo').classList.remove('hidden');
            document.getElementById('hilo-autor').focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        window.ocultarFormHilo = function() {
            document.getElementById('form-nuevo-hilo').classList.add('hidden');
            document.getElementById('hilo-autor').value = '';
            document.getElementById('hilo-titulo').value = '';
            document.getElementById('hilo-contenido').value = '';
        };

        // ─── PUBLICAR HILO ───────────────────────────────────────────
        window.publicarHilo = async function() {
            const autor = document.getElementById('hilo-autor').value.trim();
            const titulo = document.getElementById('hilo-titulo').value.trim();
            const contenido = document.getElementById('hilo-contenido').value.trim();
            if (!autor || !titulo || !contenido) return alert('Completa todos los campos.');

            const { error } = await client.from('foro_hilos').insert([{ autor, titulo, contenido }]);
            if (error) { alert('Error al publicar: ' + error.message); return; }

            window.ocultarFormHilo();
            cargarHilos();
        };

        // ─── CARGAR LISTA DE HILOS ───────────────────────────────────
        async function cargarHilos() {
            const { data: hilos } = await client
                .from('foro_hilos')
                .select('*')
                .order('created_at', { ascending: false });

            const { data: respuestas } = await client.from('foro_respuestas').select('hilo_id');

            const contenedor = document.getElementById('lista-hilos');
            if (!hilos || hilos.length === 0) {
                contenedor.innerHTML = '<div class="text-center text-zinc-600 py-16 text-sm">No hay hilos todavía.<br><span class="text-zinc-700">¡Sé el primero en abrir uno!</span></div>';
                return;
            }

            const conteoRespuestas = {};
            (respuestas || []).forEach(r => {
                conteoRespuestas[r.hilo_id] = (conteoRespuestas[r.hilo_id] || 0) + 1;
            });

            contenedor.innerHTML = hilos.map(h => {
                const fecha = new Date(h.created_at).toLocaleDateString('es-PE', { day: 'numeric', month: 'short' });
                const nRespuestas = conteoRespuestas[h.id] || 0;
                return `
                <div onclick="window.abrirHilo(${h.id})"
                    class="bg-zinc-900 border border-zinc-800 hover:border-zinc-600 rounded-2xl p-5 cursor-pointer transition-all fade-in group">
                    <div class="flex items-start justify-between gap-3">
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-white text-sm leading-tight mb-1 group-hover:text-red-400 transition-colors">${h.titulo}</h3>
                            <p class="text-zinc-500 text-xs truncate">${h.contenido}</p>
                        </div>
                        <div class="flex flex-col items-end gap-1 flex-shrink-0">
                            <span class="text-xs font-bold text-zinc-600">${fecha}</span>
                            <span class="text-xs text-zinc-500">${nRespuestas} resp.</span>
                        </div>
                    </div>
                    <div class="mt-3 flex items-center gap-2">
                        <div class="w-5 h-5 rounded-full bg-zinc-700 flex items-center justify-center text-[10px] font-black">
                            ${h.autor.charAt(0).toUpperCase()}
                        </div>
                        <span class="text-xs text-zinc-400 font-bold">${h.autor}</span>
                    </div>
                </div>
                `;
            }).join('');
        }

        // ─── ABRIR HILO ──────────────────────────────────────────────
        window.abrirHilo = async function(hiloId) {
            hiloActualId = hiloId;
            document.getElementById('vista-lista').classList.add('hidden');
            document.getElementById('form-nuevo-hilo').classList.add('hidden');
            document.getElementById('vista-hilo').classList.remove('hidden');
            document.getElementById('detalle-hilo').innerHTML = '<p class="text-zinc-600 text-sm">Cargando...</p>';

            const { data: hilo } = await client.from('foro_hilos').select('*').eq('id', hiloId).single();
            const { data: respuestas } = await client.from('foro_respuestas').select('*').eq('hilo_id', hiloId).order('created_at', { ascending: true });

            const fecha = new Date(hilo.created_at).toLocaleDateString('es-PE', { day: 'numeric', month: 'long', year: 'numeric' });

            document.getElementById('detalle-hilo').innerHTML = `
            <div class="bg-zinc-900 border border-red-800 rounded-2xl p-5 mb-2">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-red-700 to-red-900 flex items-center justify-center text-sm font-black">
                        ${hilo.autor.charAt(0).toUpperCase()}
                    </div>
                    <div>
                        <p class="font-bold text-sm text-white">${hilo.autor}</p>
                        <p class="text-[10px] text-zinc-500">${fecha}</p>
                    </div>
                    <span class="ml-auto text-[10px] font-black bg-red-900 text-red-300 px-2 py-0.5 rounded-full uppercase">Creador del hilo</span>
                </div>
                <h2 class="text-xl font-black text-white mb-2">${hilo.titulo}</h2>
                <p class="text-sm text-zinc-300 leading-relaxed">${hilo.contenido}</p>
            </div>
            `;

            renderizarRespuestas(respuestas || []);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function renderizarRespuestas(respuestas) {
            const contenedor = document.getElementById('respuestas-hilo');
            if (respuestas.length === 0) {
                contenedor.innerHTML = '<p class="text-xs text-zinc-700 italic text-center py-4">Nadie ha respondido todavía.</p>';
                return;
            }
            contenedor.innerHTML = respuestas.map((r, i) => {
                const fecha = new Date(r.created_at).toLocaleDateString('es-PE', { day: 'numeric', month: 'short' });
                return `
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4 fade-in">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-7 h-7 rounded-full bg-zinc-700 flex items-center justify-center text-xs font-black flex-shrink-0">
                            ${r.autor.charAt(0).toUpperCase()}
                        </div>
                        <span class="text-xs font-bold text-zinc-300">${r.autor}</span>
                        <span class="text-[10px] text-zinc-600 ml-auto">#${i + 1} · ${fecha}</span>
                    </div>
                    <p class="text-sm text-zinc-400 leading-relaxed">${r.contenido}</p>
                </div>
                `;
            }).join('');
        }

        // ─── RESPONDER HILO ──────────────────────────────────────────
        window.responderHilo = async function() {
            const autor = document.getElementById('resp-autor').value.trim();
            const contenido = document.getElementById('resp-contenido').value.trim();
            if (!autor || !contenido) return alert('Escribe tu nombre y una respuesta.');
            if (!hiloActualId) return;

            const { error } = await client.from('foro_respuestas').insert([{ hilo_id: hiloActualId, autor, contenido }]);
            if (error) { alert('Error: ' + error.message); return; }

            document.getElementById('resp-autor').value = '';
            document.getElementById('resp-contenido').value = '';

            const { data: respuestas } = await client.from('foro_respuestas').select('*').eq('hilo_id', hiloActualId).order('created_at', { ascending: true });
            renderizarRespuestas(respuestas || []);
        };

        // ─── VOLVER A LISTA ──────────────────────────────────────────
        window.volverALista = function() {
            hiloActualId = null;
            document.getElementById('vista-hilo').classList.add('hidden');
            document.getElementById('vista-lista').classList.remove('hidden');
        };

        cargarHilos();
    })();
    </script>
</body>
</html>
