<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuvng Miuze | Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121212] text-white font-sans antialiased pb-20">

    <!-- CABECERA -->
    <header class="bg-gradient-to-b from-zinc-800 to-[#121212] p-10 pt-20 border-b border-zinc-800">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row items-center md:items-end gap-6 text-center md:text-left">
            <img id="foto-perfil" src="" alt="Yuvng Miuze" class="w-48 h-48 rounded-full shadow-2xl object-cover bg-zinc-700 hidden">
            <div id="placeholder-foto" class="w-48 h-48 rounded-full bg-zinc-700 shadow-2xl flex-shrink-0"></div>
            <div>
                <span class="text-sm font-bold uppercase tracking-widest text-zinc-300">Artista Verificado</span>
                <h1 id="nombre-artista" class="text-5xl md:text-7xl font-black mt-2 mb-4">Yuvng Miuze</h1>
                <p id="bio-artista" class="text-zinc-400 text-sm max-w-lg mb-4">Escucha los últimos lanzamientos oficiales.</p>
                <div class="flex gap-4 justify-center md:justify-start">
                    <a href="#" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-full text-sm font-bold transition-colors">Instagram</a>
                    <a href="#" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-full text-sm font-bold transition-colors">YouTube</a>
                </div>
            </div>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="max-w-4xl mx-auto p-10 grid grid-cols-1 md:grid-cols-3 gap-10">
        
        <!-- COLUMNA IZQUIERDA -->
        <div class="md:col-span-2">
            <h2 class="text-2xl font-bold mb-6 border-b border-zinc-800 pb-2">Populares</h2>
            <div id="contenedor-canciones" class="flex flex-col gap-4 mb-16"></div>

            <h2 class="text-2xl font-bold mb-6 border-b border-zinc-800 pb-2">Muro de Fans</h2>
            <div class="bg-zinc-900 p-6 rounded-lg mb-8">
                <div class="flex flex-col gap-3">
                    <input type="text" id="input-nombre" placeholder="Tu Nombre o Apodo" class="bg-zinc-800 text-white p-3 rounded outline-none focus:ring-2 focus:ring-green-500">
                    <textarea id="input-mensaje" placeholder="¿Qué te parece la música?" rows="3" class="bg-zinc-800 text-white p-3 rounded outline-none focus:ring-2 focus:ring-green-500 resize-none"></textarea>
                    <button onclick="enviarComentario()" class="bg-green-500 hover:bg-green-400 text-black font-bold py-3 rounded transition-colors">Publicar Mensaje</button>
                </div>
            </div>
            <div id="contenedor-comentarios" class="flex flex-col gap-4"></div>
        </div>

        <!-- COLUMNA DERECHA -->
        <div class="md:col-span-1">
            <h2 class="text-2xl font-bold mb-6 border-b border-zinc-800 pb-2">Próximos Shows</h2>
            <div id="contenedor-eventos" class="flex flex-col gap-4 mb-16">
                <p class="text-zinc-500 text-sm">Cargando fechas...</p>
            </div>

            <h2 class="text-2xl font-bold mb-6 border-b border-zinc-800 pb-2">En Vivo</h2>
            <div class="bg-zinc-900 rounded-lg overflow-hidden border border-zinc-800">
                <iframe src="https://player.twitch.tv/?channel=leppezs&parent=localhost&parent=127.0.0.1" frameborder="0" allowfullscreen="true" scrolling="no" height="250" width="100%"></iframe>
                <div class="p-4 text-center">
                    <p class="text-sm font-bold text-purple-400">Twitch</p>
                    <p class="text-xs text-zinc-400">Sigue las transmisiones.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ¡ATENCIÓN AQUÍ!
        // Borra PEGA_TU_LINK_AQUI y pon el link de Render que copiaste hace un momento.
        const SERVIDOR_URL = 'https://foro-artistas.onrender.com';

        async function cargarPerfil() {
            try {
                const res = await fetch(`${SERVIDOR_URL}/perfil`);
                const json = await res.json();
                if (json.datos && json.datos.length > 0) {
                    const perfil = json.datos[0];
                    if (perfil.nombre) document.getElementById('nombre-artista').innerText = perfil.nombre;
                    if (perfil.biografia) document.getElementById('bio-artista').innerText = perfil.biografia;
                    if (perfil.foto_perfil_url) {
                        const img = document.getElementById('foto-perfil');
                        img.src = perfil.foto_perfil_url;
                        img.classList.remove('hidden');
                        document.getElementById('placeholder-foto').classList.add('hidden');
                    }
                }
            } catch (e) {}
        }

        async function cargarCanciones() {
            try {
                const res = await fetch(`${SERVIDOR_URL}/canciones`);
                const datos = await res.json();
                const contenedor = document.getElementById('contenedor-canciones');
                contenedor.innerHTML = ''; 
                datos.canciones.forEach(cancion => {
                    const div = document.createElement('div');
                    div.innerHTML = cancion.enlace_embed;
                    contenedor.appendChild(div);
                });
            } catch (e) {}
        }
        
        async function cargarEventos() {
            try {
                const res = await fetch(`${SERVIDOR_URL}/eventos`);
                const datos = await res.json();
                const contenedor = document.getElementById('contenedor-eventos');
                contenedor.innerHTML = ''; 
                if(datos.eventos.length === 0) {
                    contenedor.innerHTML = '<p class="text-zinc-500 text-sm">No hay fechas confirmadas por ahora.</p>';
                    return;
                }
                datos.eventos.forEach(evento => {
                    const div = document.createElement('div');
                    div.className = "bg-zinc-800 p-4 rounded-lg flex flex-col gap-2";
                    div.innerHTML = `
                        <div class="flex justify-between items-center border-b border-zinc-700 pb-2">
                            <span class="font-bold text-green-400 text-sm">${evento.fecha}</span>
                            <span class="text-xs font-bold uppercase tracking-wider text-zinc-400">${evento.ciudad}</span>
                        </div>
                        <p class="text-zinc-200 text-sm font-semibold">${evento.lugar}</p>
                        ${evento.link_tickets ? `<a href="${evento.link_tickets}" target="_blank" class="mt-2 text-center bg-white text-black text-xs font-bold py-2 rounded-full hover:scale-105 transition-transform">Tickets</a>` : ''}
                    `;
                    contenedor.appendChild(div);
                });
            } catch (e) {}
        }

        async function cargarComentarios() {
            try {
                const res = await fetch(`${SERVIDOR_URL}/comentarios`);
                const datos = await res.json();
                const contenedor = document.getElementById('contenedor-comentarios');
                contenedor.innerHTML = ''; 
                if(datos.comentarios.length === 0) {
                    contenedor.innerHTML = '<p class="text-zinc-500">Sé el primero en comentar.</p>';
                    return;
                }
                datos.comentarios.forEach(comentario => {
                    const fecha = new Date(comentario.creado_en).toLocaleDateString();
                    const div = document.createElement('div');
                    div.className = "bg-zinc-800 p-4 rounded-lg";
                    div.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <span class="font-bold text-green-400">${comentario.nombre_usuario}</span>
                            <span class="text-xs text-zinc-500">${fecha}</span>
                        </div>
                        <p class="text-zinc-300 text-sm">${comentario.mensaje}</p>
                    `;
                    contenedor.appendChild(div);
                });
            } catch (e) {}
        }

        async function enviarComentario() {
            const nombre = document.getElementById('input-nombre').value;
            const mensaje = document.getElementById('input-mensaje').value;
            if(!nombre || !mensaje) {
                alert("Por favor, llena tu nombre y el mensaje.");
                return;
            }
            try {
                await fetch(`${SERVIDOR_URL}/comentarios`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre_usuario: nombre, mensaje: mensaje })
                });
                document.getElementById('input-nombre').value = '';
                document.getElementById('input-mensaje').value = '';
                cargarComentarios();
            } catch (error) {
                alert("Hubo un error al enviar tu mensaje.");
            }
        }

        cargarPerfil();
        cargarCanciones();
        cargarEventos();
        cargarComentarios();
    </script>
</body>
</html>
