<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil | MusaConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .input-field {
            width: 100%; background: #1c1c1c; border: 1.5px solid #27272a;
            color: #fff; border-radius: 10px; padding: 10px 14px; font-size: 14px;
        }
        .input-field:focus { outline: none; border-color: #7c3aed; }
        .btn-primary { background: #7c3aed; color: #fff; font-weight: 700; padding: 12px; border-radius: 10px; transition: all 0.2s; }
        .btn-primary:hover { background: #6d28d9; }
        .btn-primary:disabled { background: #3f3f46; cursor: not-allowed; }
    </style>
</head>
<body class="bg-[#0e0e0e] text-white min-h-screen">

    <!-- HEADER DE NAVEGACIÓN -->
    <header class="border-b border-zinc-800/50 bg-[#0e0e0e]/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-xl mx-auto px-4 h-14 flex items-center justify-between">
            <a href="profile.html" class="text-zinc-400 hover:text-white flex items-center gap-1 text-sm transition-colors">
                ← Cancelar
            </a>
            <span class="font-black text-sm text-purple-500 uppercase tracking-widest">Ajustes de Cuenta</span>
            <div class="w-16"></div>
        </div>
    </header>

    <main class="max-w-xl mx-auto pt-6 px-4">
        <div class="bg-[#141414] border border-zinc-800 rounded-2xl p-6 space-y-6">
            
            <!-- SUBIDA DE FOTO REAL -->
            <div class="flex flex-col items-center text-center border-b border-zinc-800/60 pb-6">
                <div id="avatar-preview" class="w-24 h-24 rounded-full bg-zinc-800 flex items-center justify-center text-3xl font-black mb-4 overflow-hidden ring-4 ring-purple-600/20">
                    📸
                </div>
                <label class="cursor-pointer bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 text-xs font-bold px-4 py-2 rounded-lg transition-colors">
                    Cambiar foto de perfil
                    <input type="file" id="avatar-file" accept="image/jpeg, image/png, image/webp" class="hidden" onchange="previsualizarImagen(this)">
                </label>
                <p class="text-[10px] text-zinc-500 mt-2">Formatos aceptados: JPG, PNG, WEBP. Tamaño máximo: 4 MB.</p>
            </div>

            <!-- FORMULARIO DE TEXTO -->
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-zinc-400 block mb-1">Nombre en pantalla</label>
                    <input type="text" id="perfil-nombre" class="input-field" placeholder="Tu nombre artístico">
                </div>

                <div>
                    <label class="text-xs font-bold text-zinc-400 block mb-1">Biografía</label>
                    <textarea id="perfil-bio" class="input-field resize-none" rows="3" placeholder="Cuéntale al mundo quién eres..." maxlength="160"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-zinc-400 block mb-1">Instagram (URL)</label>
                        <input type="text" id="link-instagram" class="input-field text-xs" placeholder="https://instagram.com/...">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-zinc-400 block mb-1">Spotify (URL)</label>
                        <input type="text" id="link-spotify" class="input-field text-xs" placeholder="https://open.spotify.com/...">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-zinc-400 block mb-1">🔴 URL de tu Stream en Vivo</label>
                    <input type="text" id="link-stream" class="input-field text-xs" placeholder="https://twitch.tv/tu_canal">
                    <p class="text-[10px] text-zinc-500 mt-1">Esta es la URL que se mostrará en tu perfil cuando hagas clic en "Conectar" del panel En Vivo.</p>
                </div>

                <!-- NUEVA SECCIÓN: ENLACES PERSONALIZADOS (LINKTREE INTERNO) -->
                <div class="pt-4 border-t border-zinc-800/60 mt-6">
                    <label class="text-xs font-bold text-zinc-400 block mb-1">🔗 Enlaces Adicionales (Estilo Linktree)</label>
                    <p class="text-[10px] text-zinc-500 mb-3">Agrega tu canal de YouTube, tienda de merch, TikTok, etc.</p>
                    
                    <div id="contenedor-links-dinamicos" class="space-y-3 mb-3">
                        <!-- Aquí aparecerán los inputs dinámicos -->
                    </div>
                    
                    <button type="button" onclick="agregarInputLink('', '')" class="text-xs font-bold text-purple-400 hover:text-purple-300 bg-purple-900/20 border border-purple-800/50 px-4 py-2 rounded-lg w-full transition-colors flex items-center justify-center gap-2">
                        <span>+</span> Añadir un nuevo enlace
                    </button>
                </div>

                <!-- Elemento msg-box posicionado correctamente -->
                <div id="msg-box" class="hidden text-xs px-3 py-2 rounded-lg mb-4 mt-4"></div>

                <button id="btn-guardar" onclick="guardarTodo()" class="btn-primary w-full mt-2">Guardar cambios del perfil</button>
            </div>

        </div>
    </main>

    <script>
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let usuarioActual = null;
        let urlFotoFinal = null;

        async function init() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            usuarioActual = user;

            // Cargar datos actuales de la BD
            const { data: perfil } = await client.from('perfiles').select('*').eq('id', user.id).single();
            if (perfil) {
                document.getElementById('perfil-nombre').value = perfil.nombre_display || '';
                document.getElementById('perfil-bio').value = perfil.bio || '';
                document.getElementById('link-instagram').value = perfil.link_instagram || '';
                document.getElementById('link-spotify').value = perfil.link_spotify || '';
                document.getElementById('link-stream').value = perfil.link_stream || '';
                
                urlFotoFinal = perfil.avatar_url;
                if(urlFotoFinal) {
                    document.getElementById('avatar-preview').innerHTML = `<img src="${urlFotoFinal}" class="w-full h-full object-cover">`;
                }

                // Cargar links dinámicos si existen
                if (perfil.links_custom && Array.isArray(perfil.links_custom)) {
                    perfil.links_custom.forEach(link => {
                        agregarInputLink(link.titulo, link.url);
                    });
                }
            }
        }

        // Función para agregar los cajones de Título y URL
        window.agregarInputLink = function(tituloValor = '', urlValor = '') {
            const container = document.getElementById('contenedor-links-dinamicos');
            const div = document.createElement('div');
            div.className = 'flex gap-2 items-start link-item fade-in';
            div.innerHTML = `
                <div class="flex-1 space-y-2">
                    <input type="text" placeholder="Título (Ej: Mi Nuevo Videoclip)" value="${tituloValor}" class="input-field text-xs link-titulo">
                    <input type="url" placeholder="URL (Ej: https://youtube.com/...)" value="${urlValor}" class="input-field text-xs link-url">
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="bg-red-900/20 text-red-500 hover:text-red-400 border border-red-900/50 p-2.5 rounded-lg transition-colors h-full flex items-center mt-1">
                    ✕
                </button>
            `;
            container.appendChild(div);
        }

        // Mostrar la foto en la pantalla apenas el usuario la elija de su galería
        window.previsualizarImagen = function(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];

                if (file.size > 4 * 1024 * 1024) {
                    alert("¡Archivo demasiado pesado! Elige una imagen más liviana (menor a 4 MB).");
                    input.value = ''; 
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('avatar-preview').innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                }
                reader.readAsDataURL(file);
            }
        }

        window.guardarTodo = async function() {
            const btn = document.getElementById('btn-guardar');
            const msgBox = document.getElementById('msg-box');
            const fileInput = document.getElementById('avatar-file');
            
            const nombre = document.getElementById('perfil-nombre').value.trim();
            const bio = document.getElementById('perfil-bio').value.trim();
            const insta = document.getElementById('link-instagram').value.trim();
            const spoty = document.getElementById('link-spotify').value.trim();
            const stream = document.getElementById('link-stream').value.trim();

            if (!nombre) return mostrarMensaje("El nombre en pantalla es obligatorio.", false);

            // Capturar links personalizados
            const linkItems = document.querySelectorAll('.link-item');
            const linksPersonalizados = [];
            linkItems.forEach(item => {
                const titulo = item.querySelector('.link-titulo').value.trim();
                const url = item.querySelector('.link-url').value.trim();
                if(titulo && url) linksPersonalizados.push({ titulo, url });
            });

            btn.disabled = true;
            btn.textContent = "Procesando datos...";

            // 1. Subir foto si hay una nueva
            if (fileInput.files && fileInput.files[0]) {
                const file = fileInput.files[0];
                const fileExt = file.name.split('.').pop();
                const filePath = `${usuarioActual.id}-${Date.now()}.${fileExt}`;

                const { data: uploadData, error: uploadError } = await client.storage
                    .from('avatares')
                    .upload(filePath, file, { cacheControl: '3600', upsert: true });

                if (uploadError) {
                    btn.disabled = false;
                    btn.textContent = "Guardar cambios del perfil";
                    return mostrarMensaje("Error al subir archivo: " + uploadError.message, false);
                }

                const { data: { publicUrl } } = client.storage.from('avatares').getPublicUrl(filePath);
                urlFotoFinal = publicUrl;
            }

            // 2. Guardar datos y array de links en Supabase
            const { error: updateError } = await client.from('perfiles').update({
                nombre_display: nombre,
                bio: bio,
                avatar_url: urlFotoFinal,
                link_instagram: insta,
                link_spotify: spoty,
                link_stream: stream,
                links_custom: linksPersonalizados
            }).eq('id', usuarioActual.id);

            btn.disabled = false;
            btn.textContent = "Guardar cambios del perfil";

            if (updateError) {
                mostrarMensaje("Error al guardar texto: " + updateError.message, false);
            } else {
                mostrarMensaje("¡Perfil actualizado con éxito! Redirigiendo...", true);
                setTimeout(() => window.location.href = 'profile.html', 2000);
            }
        }

        function mostrarMensaje(texto, exito) {
            const msgBox = document.getElementById('msg-box');
            msgBox.textContent = texto;
            msgBox.className = `text-xs px-3 py-2 rounded-lg ${exito ? 'bg-green-900/30 text-green-400 border border-green-800' : 'bg-red-900/30 text-red-400 border border-red-800'}`;
            msgBox.classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
