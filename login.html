<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Artista - Yuvng Miuze</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-xl shadow-2xl w-full max-w-md relative">
        
        <a href="index.html" class="absolute top-4 left-4 text-zinc-500 hover:text-white transition-colors text-sm flex items-center">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Volver
        </a>

        <div class="text-center mt-8 mb-8">
            <h1 class="text-3xl font-black tracking-wider mb-2">MODO<span class="text-red-600"> EDITOR</span></h1>
            <p class="text-zinc-400 text-sm">Acceso exclusivo para la gestión de Yuvng Miuze</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-zinc-400 text-sm font-bold mb-2" for="email">Correo Electrónico</label>
                <input class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg py-3 px-4 focus:outline-none focus:border-red-600" 
                       id="email" type="email" placeholder="artista@correo.com" required>
            </div>
            
            <div>
                <label class="block text-zinc-400 text-sm font-bold mb-2" for="password">Contraseña</label>
                <input class="w-full bg-zinc-800 border border-zinc-700 text-white rounded-lg py-3 px-4 focus:outline-none focus:border-red-600" 
                       id="password" type="password" placeholder="••••••••" required>
            </div>

            <p id="errorMsg" class="text-red-500 text-sm text-center hidden">Credenciales incorrectas. Intenta nuevamente.</p>

            <button type="submit" class="w-full bg-white text-black hover:bg-zinc-200 font-bold py-3 px-4 rounded-lg transition-colors mt-4 flex justify-center items-center">
                <span>Ingresar al Panel</span>
            </button>
        </form>
        
        <div class="mt-8 text-center text-xs text-zinc-600 border-t border-zinc-800 pt-4">
            Sistema de Administración Seguro
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btnText = document.querySelector('button span');
            
            btnText.textContent = "Verificando...";
            errorMsg.classList.add('hidden');

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.classList.remove('hidden');
                btnText.textContent = "Ingresar al Panel";
            } else {
                btnText.textContent = "¡Acceso Concedido!";
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            }
        });
    </script>
</body>
</html>
