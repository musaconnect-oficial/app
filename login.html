<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. Pon tus llaves de acceso aquí
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 2. Lógica cuando el artista presiona "Ingresar"
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btnText = document.querySelector('button span');
            
            btnText.textContent = "Verificando credenciales...";
            errorMsg.classList.add('hidden');

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.classList.remove('hidden');
                btnText.textContent = "Ingresar al Panel";
            } else {
                btnText.textContent = "¡Acceso Concedido!";
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            }
        });
    </script>
</body>
</html>
