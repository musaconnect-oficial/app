<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones | MusaConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .noti-card { background: #141414; border-bottom: 1px solid #27272a; transition: background 0.2s; }
        .noti-card:hover { background: #1c1c1c; }
        .no-leida { border-left: 4px solid #dc2626; background: rgba(220, 38, 38, 0.05); }
    </style>
</head>
<body class="bg-[#0e0e0e] text-white min-h-screen">

    <header class="bg-[#0e0e0e] border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="profile.html" class="text-zinc-400 hover:text-white text-sm transition-colors">← Mi Perfil</a>
            <h1 class="text-base font-black tracking-tight">NOTIFICACIONES</h1>
            <div class="w-16 text-right">
                <button onclick="marcarLeidas()" class="text-xs text-red-500 font-bold hover:text-red-400">Limpiar</button>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto pt-2 pb-20">
        <div id="lista-notificaciones">
            <p class="text-center text-zinc-600 py-10 text-sm">Cargando...</p>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        let usuarioActual = null;

        async function init() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            usuarioActual = user;
            cargarNotificaciones();
        }

        async function cargarNotificaciones() {
            const lista = document.getElementById('lista-notificaciones');
            const { data: notis } = await client.from('notificaciones')
                .select('*')
                .eq('usuario_id', usuarioActual.id)
                .order('created_at', { ascending: false });

            if (!notis || notis.length === 0) {
                lista.innerHTML = `
                    <div class="text-center py-16">
                        <span class="text-4xl mb-4 block">📭</span>
                        <p class="text-zinc-500 text-sm">Todo tranquilo por aquí.</p>
                        <p class="text-zinc-600 text-xs">Aún no tienes notificaciones.</p>
                    </div>`;
                return;
            }

            lista.innerHTML = notis.map(n => {
                const icono = n.tipo === 'like' ? '❤️' : (n.tipo === 'match' ? '🤝' : '💬');
                const fecha = new Date(n.created_at).toLocaleDateString('es-PE', { day:'numeric', month:'short' });
                return `
                <div class="noti-card p-4 ${n.leida ? '' : 'no-leida'}">
                    <div class="flex gap-4 items-center">
                        <div class="w-10 h-10 rounded-full bg-zinc-900 flex items-center justify-center text-lg flex-shrink-0">${icono}</div>
                        <div class="flex-1">
                            <p class="text-sm text-zinc-300 leading-snug">${n.mensaje}</p>
                            <span class="text-[10px] text-zinc-600 font-bold">${fecha}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        async function marcarLeidas() {
            if (!usuarioActual) return;
            await client.from('notificaciones').update({ leida: true }).eq('usuario_id', usuarioActual.id);
            cargarNotificaciones();
        }

        init();
    </script>
</body>
</html>
