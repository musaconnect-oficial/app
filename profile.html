<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | MusaConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .input-field {
            width: 100%; background: #1c1c1c; border: 1px solid #27272a;
            color: #fff; border-radius: 8px; padding: 10px 14px; font-size: 13px;
        }
        .input-field:focus { outline: none; border-color: #7c3aed; }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        /* Scrollbar delgada para los comentarios */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        
        .live-pulse { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); animation: pulseRed 2s infinite; }
        @keyframes pulseRed {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
    </style>
</head>
<body class="bg-[#121212] text-white min-h-screen pb-20">

    <!-- HEADER -->
    <header class="border-b border-zinc-800/50 bg-[#121212]/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="bg-zinc-800/80 hover:bg-zinc-700 text-white text-xs font-bold px-4 py-2 rounded-lg transition-colors border border-zinc-700">← Volver al Menú</a>
            <div class="flex items-center gap-3">
                <a href="feed.html" class="text-zinc-400 hover:text-white text-xs font-bold transition-colors hidden sm:block mr-2">Muro Global</a>
                <a href="editar-perfil.html" class="bg-purple-600 hover:bg-purple-500 text-white text-xs font-bold px-5 py-2 rounded-full transition-colors shadow-[0_0_15px_rgba(147,51,234,0.4)]">Editar perfil</a>
                <button onclick="cerrarSesion()" class="text-red-500 hover:text-red-400 text-xs font-bold px-3 transition-colors">Salir</button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto pt-8 px-4">
        
        <!-- TARJETA DEL PERFIL -->
        <div class="bg-[#141414] border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl mb-8 relative">
            <div class="h-32 md:h-48 bg-gradient-to-r from-purple-900/60 to-[#0e0e0e] relative"></div>
            <div class="px-6 md:px-10 pb-8 relative">
                <div id="profile-avatar" class="absolute -top-12 md:-top-16 w-24 h-24 md:w-32 md:h-32 rounded-full bg-zinc-800 border-4 border-[#141414] overflow-hidden flex items-center justify-center text-4xl shadow-xl">
                    <span class="animate-pulse">⏳</span>
                </div>
                
                <div class="pt-16 md:pt-20 flex flex-col md:flex-row md:justify-between md:items-start gap-6">
                    <div>
                        <h1 id="profile-name" class="text-2xl md:text-4xl font-black tracking-tight">Cargando...</h1>
                        <p id="profile-username" class="text-zinc-500 text-sm font-medium mt-1">@...</p>
                        <span id="profile-role" class="inline-block mt-3 text-[10px] font-black uppercase tracking-wider text-purple-400 bg-purple-900/20 px-2.5 py-1 rounded-md border border-purple-900/50">...</span>
                    </div>
                    <div id="profile-links" class="flex flex-wrap gap-3"></div>
                </div>
                <p id="profile-bio" class="text-zinc-300 text-sm mt-6 border-t border-zinc-800/60 pt-4 leading-relaxed">Aún no hay biografía configurada.</p>
            </div>
        </div>

        <!-- PANEL DE CONTROL (AGREGAR CONTENIDO) -->
        <div class="bg-zinc-900/50 border border-zinc-800 rounded-2xl p-6 mb-12 shadow-lg">
            <h3 class="text-sm font-black uppercase tracking-widest text-zinc-400 mb-4 text-center">Panel de Control del Artista</h3>
            
            <div class="flex flex-wrap gap-4 mb-6">
                <button onclick="mostrarPanel('panel-fragmento')" class="flex-1 min-w-[150px] bg-[#141414] border border-green-900/50 hover:border-green-500 text-green-500 p-4 rounded-xl transition-all font-bold text-sm flex flex-col items-center gap-2">
                    <span class="text-2xl">🎵</span> Spotify
                </button>
                <button onclick="mostrarPanel('panel-preview')" class="flex-1 min-w-[150px] bg-[#141414] border border-purple-900/50 hover:border-purple-500 text-purple-400 p-4 rounded-xl transition-all font-bold text-sm flex flex-col items-center gap-2">
                    <span class="text-2xl">🎬</span> Preview
                </button>
                <button onclick="mostrarPanel('panel-evento')" class="flex-1 min-w-[150px] bg-[#141414] border border-orange-900/50 hover:border-orange-500 text-orange-400 p-4 rounded-xl transition-all font-bold text-sm flex flex-col items-center gap-2">
                    <span class="text-2xl">🎟️</span> Evento
                </button>
            </div>

            <!-- Panel Fragmento -->
            <div id="panel-fragmento" class="hidden bg-[#141414] p-5 rounded-xl border border-zinc-800 fade-in">
                <input type="text" id="input-titulo-cancion" placeholder="Título del fragmento" class="input-field mb-3">
                <input type="text" id="input-embed-cancion" placeholder="Pega aquí el iframe de Spotify" class="input-field mb-4">
                <button onclick="publicarCancion()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition-colors">Publicar Fragmento</button>
            </div>

            <!-- Panel Preview -->
            <div id="panel-preview" class="hidden bg-[#141414] p-5 rounded-xl border border-zinc-800 fade-in">
                <input type="text" id="input-titulo-preview" placeholder="Título del video" class="input-field mb-3">
                <input type="file" id="input-file-preview" accept="video/mp4" class="input-field mb-4 text-zinc-400 p-2">
                <button onclick="publicarPreview()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-3 rounded-lg transition-colors">Subir Preview</button>
            </div>

            <!-- Panel Evento -->
            <div id="panel-evento" class="hidden bg-[#141414] p-5 rounded-xl border border-zinc-800 fade-in">
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <input type="text" id="input-fecha-evento" placeholder="Ej: 24 Octubre" class="input-field">
                    <input type="text" id="input-ciudad-evento" placeholder="Ej: Santiago, CL" class="input-field">
                </div>
                <input type="text" id="input-lugar-evento" placeholder="Lugar (Ej: Teatro Caupolicán)" class="input-field mb-3">
                <input type="text" id="input-tickets-evento" placeholder="Link de entradas (Opcional)" class="input-field mb-4">
                <button onclick="publicarEvento()" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-3 rounded-lg transition-colors">Agregar Evento</button>
            </div>
        </div>

        <!-- ZONA DE EXHIBICIÓN: 3 COLUMNAS -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- COLUMNA 1: MÚSICA Y PREVIEWS -->
            <div class="lg:col-span-2 space-y-10">
                <!-- Lanzamientos -->
                <div>
                    <h2 class="text-xl font-bold mb-6 border-b border-zinc-800 pb-2 text-white flex items-center gap-2">🎵 Fragmentos Oficiales</h2>
                    <div id="contenedor-canciones" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>

                <!-- Adelantos con Comentarios -->
                <div>
                    <h2 class="text-xl font-bold mb-6 border-b border-purple-800 pb-2 text-purple-400 flex items-center gap-2">🎬 Adelantos (1 Min)</h2>
                    <div id="contenedor-previews" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>

            <!-- COLUMNA 2: EN VIVO Y EVENTOS -->
            <div class="space-y-10">
                <!-- MULTISTREAM EN VIVO -->
                <div>
                    <div class="flex items-center gap-3 mb-6 border-b border-red-900/50 pb-2">
                        <div class="w-3 h-3 bg-red-600 rounded-full live-pulse"></div>
                        <h2 class="text-xl font-bold text-red-500">Transmisión en Vivo</h2>
                    </div>
                    
                    <div class="bg-[#0a0a0a] border border-zinc-800 rounded-2xl overflow-hidden shadow-[0_0_20px_rgba(220,38,38,0.1)] relative group">
                        <div class="aspect-video bg-zinc-900 flex flex-col items-center justify-center border-b border-zinc-800 relative">
                            <span class="text-4xl mb-2 opacity-50">📡</span>
                            <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest">Stream Offline</p>
                        </div>
                        <div class="p-4 flex justify-between items-center bg-gradient-to-b from-[#141414] to-[#0a0a0a]">
                            <div>
                                <h3 class="font-black text-white text-sm">Multistream Global</h3>
                                <p class="text-[10px] text-zinc-500">Twitch / YouTube / TikTok</p>
                            </div>
                            <button class="bg-red-600 hover:bg-red-500 text-white text-[10px] font-black px-4 py-2 rounded-lg uppercase tracking-wider transition-colors">
                                Conectar
                            </button>
                        </div>
                    </div>
                </div>

                <!-- EVENTOS Y SHOWS -->
                <div>
                    <h2 class="text-xl font-bold mb-6 border-b border-orange-900/50 pb-2 text-orange-400 flex items-center gap-2">🎟️ Próximos Shows</h2>
                    <div id="contenedor-eventos" class="flex flex-col gap-3"></div>
                </div>
            </div>
        </div>

    </main>

    <script>
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);
        
        let miUsuarioId = null;

        function mostrarPanel(panelId) {
            ['panel-fragmento', 'panel-preview', 'panel-evento'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(panelId).classList.remove('hidden');
        }

        async function initPerfil() {
            const { data: { user } } = await client.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            miUsuarioId = user.id;

            const { data: perfil } = await client.from('perfiles').select('*').eq('id', user.id).single();
            if (perfil) {
                document.getElementById('profile-name').textContent = perfil.nombre_display || "Sin Nombre";
                document.getElementById('profile-username').textContent = "@" + perfil.username;
                document.getElementById('profile-role').textContent = perfil.tipo || "Usuario";
                document.getElementById('profile-bio').textContent = perfil.bio || "Sin biografía.";
                if (perfil.avatar_url) document.getElementById('profile-avatar').innerHTML = `<img src="${perfil.avatar_url}" class="w-full h-full object-cover">`;
                
                let linksHtml = '';
                if (perfil.link_instagram) linksHtml += `<a href="${perfil.link_instagram}" target="_blank" class="bg-gradient-to-r from-[#833ab4] via-[#fd1d1d] to-[#fcb045] text-white px-4 py-2 rounded-full text-[11px] font-black tracking-widest uppercase hover:scale-105 transition-transform shadow-[0_0_15px_rgba(253,29,29,0.3)]">📸 IG</a>`;
                if (perfil.link_spotify) linksHtml += `<a href="${perfil.link_spotify}" target="_blank" class="bg-[#1DB954] text-black px-4 py-2 rounded-full text-[11px] font-black tracking-widest uppercase hover:scale-105 transition-transform shadow-[0_0_15px_rgba(29,185,84,0.3)]">🎵 Spotify</a>`;
                document.getElementById('profile-links').innerHTML = linksHtml;
            }

            cargarLanzamientos();
            cargarPreviews();
            cargarEventos();
        }

        // --- SISTEMA DE FRAGMENTOS ---
        async function cargarLanzamientos() {
            const { data: canciones } = await client.from('canciones').select('*').eq('usuario_id', miUsuarioId).order('id', { ascending: false });
            const cont = document.getElementById('contenedor-canciones');
            if (canciones && canciones.length > 0) {
                cont.innerHTML = canciones.map(c => `
                    <div class="bg-[#0a0a0a] border border-green-500/20 p-3 rounded-2xl hover:border-green-500/60 transition-all duration-300 fade-in relative group">
                        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-green-600 to-green-400 rounded-t-2xl opacity-80"></div>
                        <div class="px-2 pb-2 pt-1 flex justify-between items-center">
                            <h3 class="font-black text-white text-sm truncate pr-2">${c.titulo}</h3>
                            <button onclick="borrarCancion(${c.id})" class="text-red-500 hover:text-red-400 text-xs bg-red-900/20 p-1.5 rounded-lg transition-colors opacity-0 group-hover:opacity-100" title="Borrar">🗑️</button>
                        </div>
                        <div class="rounded-xl overflow-hidden opacity-90 group-hover:opacity-100 transition-opacity">${c.enlace_embed}</div>
                    </div>
                `).join('');
            } else { cont.innerHTML = '<p class="text-zinc-600 text-sm">Sin fragmentos subidos.</p>'; }
        }

        window.publicarCancion = async function() {
            const titulo = document.getElementById('input-titulo-cancion').value.trim();
            const embed = document.getElementById('input-embed-cancion').value.trim();
            if(!titulo || !embed) return;
            await client.from('canciones').insert([{ usuario_id: miUsuarioId, titulo, enlace_embed: embed }]);
            document.getElementById('input-titulo-cancion').value = ''; document.getElementById('input-embed-cancion').value = '';
            cargarLanzamientos();
        }

        window.borrarCancion = async function(id) {
            if(confirm("¿Seguro que deseas borrar este fragmento?")) {
                await client.from('canciones').delete().eq('id', id);
                cargarLanzamientos();
            }
        }

        // --- SISTEMA DE PREVIEWS CON COMENTARIOS ---
        async function cargarPreviews() {
            // Cargar videos
            const { data: previews } = await client.from('previews').select('*').eq('usuario_id', miUsuarioId).order('fecha', { ascending: false });
            // Cargar comentarios
            const { data: comentarios } = await client.from('comentarios_previews').select('*').order('fecha', { ascending: true });
            
            const cont = document.getElementById('contenedor-previews');
            if (previews && previews.length > 0) {
                cont.innerHTML = previews.map(p => {
                    // Filtrar comentarios solo de este video
                    const commentsHtml = (comentarios || []).filter(c => c.preview_id === p.id).map(c => `
                        <div class="bg-[#141414] p-2.5 rounded-lg border border-zinc-800/50 mb-1.5">
                            <p class="text-[10px] font-black text-purple-400 mb-0.5">${c.autor_nombre}</p>
                            <p class="text-xs text-zinc-300 leading-snug">${c.mensaje}</p>
                        </div>
                    `).join('');

                    return `
                    <div class="bg-[#0a0a0a] border border-purple-800/50 p-4 rounded-2xl shadow-lg fade-in group transition-all flex flex-col">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="font-black text-white text-sm truncate pr-2"><span class="text-purple-500">🎬</span> ${p.titulo}</h3>
                            <button onclick="borrarPreview(${p.id})" class="text-red-500 hover:text-red-400 text-xs bg-red-900/20 p-1.5 rounded-lg transition-colors opacity-0 group-hover:opacity-100 shrink-0" title="Borrar video">🗑️</button>
                        </div>
                        <video controls class="w-full rounded-xl bg-black outline-none border border-zinc-800 mb-4" preload="metadata">
                            <source src="${p.url_media}" type="video/mp4">
                        </video>
                        
                        <!-- CHAT DE COMENTARIOS -->
                        <div class="mt-auto border-t border-zinc-800/60 pt-3">
                            <h4 class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-3 flex items-center gap-1.5">
                                💬 Comentarios de Fans
                            </h4>
                            <div class="max-h-40 overflow-y-auto mb-3 pr-1">
                                ${commentsHtml || '<p class="text-xs text-zinc-600 italic">Nadie ha comentado aún. Sé el primero.</p>'}
                            </div>
                            <div class="flex gap-2">
                                <input type="text" id="input-comentario-${p.id}" placeholder="Escribe un comentario..." class="flex-1 bg-[#141414] border border-zinc-800 rounded-lg px-3 py-2 text-xs text-white focus:border-purple-500 outline-none transition-colors">
                                <button onclick="comentarPreview(${p.id})" class="bg-purple-600 hover:bg-purple-500 text-white font-bold px-4 py-2 rounded-lg text-xs transition-colors shadow-[0_0_10px_rgba(147,51,234,0.3)]">Enviar</button>
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
            } else { cont.innerHTML = '<p class="text-zinc-600 text-sm">Sin adelantos exclusivos.</p>'; }
        }

        window.comentarPreview = async function(previewId) {
            const input = document.getElementById(`input-comentario-${previewId}`);
            const mensaje = input.value.trim();
            if (!mensaje) return;

            // Tomamos tu nombre del HTML para no hacer una consulta pesada a la base de datos
            const nombreAutor = document.getElementById('profile-name').textContent;

            const { error } = await client.from('comentarios_previews').insert([{
                preview_id: previewId,
                usuario_id: miUsuarioId,
                autor_nombre: nombreAutor,
                mensaje: mensaje
            }]);

            if (error) alert("Error al comentar: " + error.message);
            else {
                input.value = '';
                cargarPreviews(); // Recarga y muestra el comentario nuevo al instante
            }
        }

        window.publicarPreview = async function() {
            const titulo = document.getElementById('input-titulo-preview').value.trim();
            const file = document.getElementById('input-file-preview').files[0];
            if(!titulo || !file) return alert("Falta archivo o título.");
            
            const filePath = `${miUsuarioId}-${Date.now()}.mp4`;
            await client.storage.from('previews').upload(filePath, file);
            const { data: { publicUrl } } = client.storage.from('previews').getPublicUrl(filePath);
            
            await client.from('previews').insert([{ usuario_id: miUsuarioId, titulo, url_media: publicUrl }]);
            document.getElementById('input-titulo-preview').value = ''; document.getElementById('input-file-preview').value = '';
            cargarPreviews();
        }

        window.borrarPreview = async function(id) {
            if(confirm("¿Seguro que deseas borrar este video? Se borrarán también los comentarios.")) {
                await client.from('previews').delete().eq('id', id);
                cargarPreviews();
            }
        }

        // --- SISTEMA DE EVENTOS ---
        async function cargarEventos() {
            const { data: eventos } = await client.from('eventos').select('*').eq('usuario_id', miUsuarioId).order('id', { ascending: false });
            const cont = document.getElementById('contenedor-eventos');
            if (eventos && eventos.length > 0) {
                cont.innerHTML = eventos.map(e => `
                    <div class="bg-[#141414] border border-zinc-800 p-4 rounded-xl flex items-center justify-between group fade-in hover:border-orange-500/50 transition-colors shadow-lg">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-orange-400 font-black text-sm">${e.fecha}</span>
                                <span class="text-[9px] text-zinc-500 uppercase tracking-widest border border-zinc-700 px-1.5 rounded">${e.ciudad}</span>
                            </div>
                            <p class="text-white font-bold text-sm">${e.lugar}</p>
                            ${e.link_tickets ? `<a href="${e.link_tickets}" target="_blank" class="text-orange-500 hover:text-orange-400 text-[10px] uppercase font-black mt-2 inline-block">🎟️ Entradas</a>` : ''}
                        </div>
                        <button onclick="borrarEvento(${e.id})" class="text-red-500 hover:text-red-400 bg-red-900/20 p-2 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity">🗑️</button>
                    </div>
                `).join('');
            } else { cont.innerHTML = '<p class="text-zinc-600 text-sm">No hay shows programados.</p>'; }
        }

        window.publicarEvento = async function() {
            const fecha = document.getElementById('input-fecha-evento').value.trim();
            const ciudad = document.getElementById('input-ciudad-evento').value.trim();
            const lugar = document.getElementById('input-lugar-evento').value.trim();
            const tickets = document.getElementById('input-tickets-evento').value.trim();
            
            if(!fecha || !ciudad || !lugar) return alert("Llena los datos básicos del evento.");
            await client.from('eventos').insert([{ usuario_id: miUsuarioId, fecha, ciudad, lugar, link_tickets: tickets }]);
            
            ['input-fecha-evento', 'input-ciudad-evento', 'input-lugar-evento', 'input-tickets-evento'].forEach(id => document.getElementById(id).value = '');
            cargarEventos();
        }

        window.borrarEvento = async function(id) {
            if(confirm("¿Borrar este evento?")) {
                await client.from('eventos').delete().eq('id', id);
                cargarEventos();
            }
        }

        window.cerrarSesion = async function() {
            await client.auth.signOut();
            window.location.href = 'index.html';
        }

        initPerfil();
    </script>
</body>
</html>
