<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | MusaConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#0e0e0e] text-white min-h-screen">

    <header class="border-b border-zinc-800/50 bg-[#0e0e0e]/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            
            <div class="flex items-center gap-4">
                <a href="index.html" class="bg-zinc-800/80 hover:bg-zinc-700 text-white text-xs font-bold px-4 py-2 rounded-lg transition-colors border border-zinc-700 flex items-center gap-2">
                    ← Volver al Menú
                </a>
            </div>
            
            <div class="flex items-center gap-3">
                <a href="feed.html" class="text-zinc-400 hover:text-white text-xs font-bold transition-colors hidden sm:block mr-2">Muro Global</a>
                <a href="editar-perfil.html" class="bg-purple-600 hover:bg-purple-500 text-white text-xs font-bold px-5 py-2 rounded-full transition-colors">Editar mi perfil</a>
                <button onclick="cerrarSesion()" class="text-red-500 hover:text-red-400 text-xs font-bold px-3 transition-colors">Salir</button>
            </div>

        </div>
    </header>

    <main class="max-w-4xl mx-auto pt-10 px-4 pb-20">
        
        <div class="bg-[#141414] border border-zinc-800 rounded-3xl overflow-hidden shadow-2xl">
            <div class="h-32 md:h-48 bg-gradient-to-r from-purple-900/60 to-[#0e0e0e] relative"></div>
            
            <div class="px-6 md:px-10 pb-8 relative">
                <div id="profile-avatar" class="absolute -top-12 md:-top-16 w-24 h-24 md:w-32 md:h-32 rounded-full bg-zinc-800 border-4 border-[#141414] overflow-hidden flex items-center justify-center text-4xl shadow-xl">
                    <span class="animate-pulse">⏳</span>
                </div>
                
                <div class="pt-16 md:pt-20">
                    <div class="flex flex-col md:flex-row md:justify-between md:items-start gap-4">
                        <div>
                            <h1 id="profile-name" class="text-2xl md:text-3xl font-black tracking-tight">Cargando perfil...</h1>
                            <p id="profile-username" class="text-zinc-500 text-sm font-medium mt-1">@...</p>
                            <span id="profile-role" class="inline-block mt-3 text-[10px] font-black uppercase tracking-wider text-purple-400 bg-purple-900/20 px-2.5 py-1 rounded-md border border-purple-900/50">...</span>
                        </div>
                        
                        <div id="profile-links" class="flex gap-2">
                            </div>
                    </div>
                    
                    <div class="mt-8 border-t border-zinc-800/60 pt-6">
                        <h3 class="text-xs font-black text-zinc-500 uppercase tracking-widest mb-3">Biografía</h3>
                        <p id="profile-bio" class="text-zinc-300 text-sm leading-relaxed max-w-2xl">Aún no hay biografía configurada.</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8 bg-[#141414] border border-zinc-800 border-dashed rounded-2xl p-12 text-center text-zinc-500 text-sm">
            <div class="text-3xl mb-3">🎵</div>
            <p class="font-bold text-white mb-1">Tu Portafolio Musical</p>
            <p>Aquí aparecerán tus canciones, colaboraciones y publicaciones del feed.</p>
        </div>

    </main>

    <script>
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarMiPerfil() {
            // 1. Verificamos quién está logueado
            const { data: { user }, error: authError } = await client.auth.getUser();
            
            // Si no hay usuario, lo pateamos al login
            if (!user || authError) {
                window.location.href = 'login.html';
                return;
            }

            // 2. Traemos sus datos de la tabla 'perfiles'
            const { data: perfil, error: dbError } = await client.from('perfiles').select('*').eq('id', user.id).single();

            if (dbError) {
                console.error("Error cargando perfil:", dbError);
                document.getElementById('profile-name').textContent = "Error al cargar";
                return;
            }

            // 3. Pintamos los datos en el HTML
            document.getElementById('profile-name').textContent = perfil.nombre_display || "Usuario Sin Nombre";
            document.getElementById('profile-username').textContent = "@" + perfil.username;
            document.getElementById('profile-role').textContent = perfil.tipo || "Usuario";
            
            if (perfil.bio) {
                document.getElementById('profile-bio').textContent = perfil.bio;
            }

            if (perfil.avatar_url) {
                document.getElementById('profile-avatar').innerHTML = `<img src="${perfil.avatar_url}" class="w-full h-full object-cover">`;
            } else {
                document.getElementById('profile-avatar').innerHTML = `👤`;
            }

            // Redes sociales
            let linksHtml = '';
            if (perfil.link_instagram) {
                linksHtml += `<a href="${perfil.link_instagram}" target="_blank" class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-zinc-400 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Instagram</a>`;
            }
            if (perfil.link_spotify) {
                linksHtml += `<a href="${perfil.link_spotify}" target="_blank" class="bg-green-950/30 hover:bg-green-900/50 border border-green-900/50 text-green-500 hover:text-green-400 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">Spotify</a>`;
            }
            document.getElementById('profile-links').innerHTML = linksHtml;
        }

        // Función para cerrar sesión y volver a la portada
        window.cerrarSesion = async function() {
            const { error } = await client.auth.signOut();
            if (!error) {
                window.location.href = 'index.html';
            } else {
                alert("Error al cerrar sesión: " + error.message);
            }
        }

        // Ejecutar al abrir la página
        cargarMiPerfil();
    </script>
</body>
</html>
