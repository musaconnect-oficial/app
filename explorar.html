<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar | MusaConnect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        .card-perfil { background: #141414; border: 1px solid #27272a; transition: all 0.2s; }
        .card-perfil:hover { border-color: #52525b; transform: translateY(-3px); }
        
        .badge { font-size: 10px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; color: #fff; }
        .badge-artista { background: linear-gradient(135deg, #dc2626, #991b1b); }
        .badge-compositor { background: linear-gradient(135deg, #7c3aed, #4c1d95); }
        .badge-banda { background: linear-gradient(135deg, #ea580c, #9a3412); }
    </style>
</head>
<body class="bg-[#0e0e0e] text-white min-h-screen pb-20">

    <header class="bg-[#0e0e0e]/90 backdrop-blur border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-zinc-400 hover:text-white text-sm transition-colors">⬅ Inicio</a>
            <h1 class="text-base font-black tracking-tight">EXPLORAR <span class="text-red-500">TALENTOS</span></h1>
            <a href="profile.html" class="text-zinc-400 hover:text-white text-sm transition-colors">Mi Perfil</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 pt-8">
        <div class="mb-8 text-center">
            <h2 class="text-3xl font-black mb-2">Encuentra tu próximo sonido</h2>
            <p class="text-zinc-500 text-sm">Descubre artistas, bandas y productores en la plataforma.</p>
        </div>
        <div id="grid-talentos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <p class="text-center text-zinc-600 col-span-full">Cargando comunidad...</p>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://exekwnxlfhukaojxtlcj.supabase.co';
        const supabaseKey = 'sb_publishable_JtSnzoWtEwAHhmGvcpKe0g_OfciTXzh';
        const client = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function cargarPerfiles() {
            // Buscamos a todos menos a los "fan"
            const { data: perfiles } = await client.from('perfiles')
                .select('*')
                .neq('tipo', 'fan')
                .order('created_at', { ascending: false });
                
            const grid = document.getElementById('grid-talentos');
            
            if (!perfiles || perfiles.length === 0) {
                grid.innerHTML = '<p class="text-center text-zinc-600 col-span-full py-10">Aún no hay creadores registrados.</p>';
                return;
            }
            
            grid.innerHTML = perfiles.map(p => {
                let badgeClass = p.tipo === 'artista' ? 'badge-artista' : (p.tipo === 'banda' ? 'badge-banda' : 'badge-compositor');
                let inicial = p.nombre_display.charAt(0).toUpperCase();
                let avatar = p.avatar_url ? `<img src="${p.avatar_url}" class="w-16 h-16 rounded-full object-cover">` : `<div class="w-16 h-16 rounded-full bg-zinc-800 flex items-center justify-center text-2xl font-black">${inicial}</div>`;
                let generos = (p.generos || []).slice(0,3).map(g => `<span class="text-[10px] font-bold text-zinc-400 bg-zinc-900 px-2 py-1 rounded border border-zinc-800">${g}</span>`).join('');
                
                return `
                <a href="visor.html?u=${p.username}" class="card-perfil p-5 rounded-2xl flex flex-col items-center text-center">
                    <div class="mb-3">${avatar}</div>
                    <span class="badge ${badgeClass} mb-2">${p.tipo}</span>
                    <h3 class="font-bold text-lg mb-1">${p.nombre_display}</h3>
                    <p class="text-zinc-500 text-xs mb-3">@${p.username}</p>
                    <div class="flex flex-wrap gap-1 justify-center mb-4">${generos}</div>
                    <button class="w-full bg-zinc-800 hover:bg-zinc-700 text-white text-xs font-bold py-2 rounded-lg transition-colors">Ver Perfil</button>
                </a>`;
            }).join('');
        }
        
        cargarPerfiles();
    </script>
</body>
</html>
